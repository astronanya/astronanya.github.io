      }
      // distant storm clouds
      for(let i=0;i<4;i++){
        const cxx = ((i*150 + px*0.5) % 640 + 640) % 640 - 120;
        mkCloud(cxx, 14+(i*13)%26, i%2?1.2:0.9, '#3a2f52', '#2a2340', '#1e1830');
      }
      // low extra cloud layer drifting the other way
      for(let i=0;i<3;i++){
        const cxx = ((i*210+90 - px*0.35) % 700 + 700) % 700 - 130;
        mkCloud(cxx, 52+(i*17)%20, 0.8, '#2a2340', '#1e1830', '#161226');
      }
      // cloud bellies flicker faintly during the warning
      if(warn && Math.sin(gtime*18)>0.35){
        ctx.fillStyle = 'rgba(180,160,255,0.10)'; ctx.fillRect(0,0,VW,64);
      }
      // far marsh hills, half-swallowed by mist
      ctx.fillStyle = strike? '#3c3458' : '#141a2c';
      for(let i=0;i<6;i++){
        const hx = ((i*175 + px*0.5) % 1050 + 1050) % 1050 - 130;
        const hw2 = 120 + (i*37)%90, hh2 = 16 + (i*23)%16;
        ctx.fillRect(Math.round(hx), GROUND_Y-28-hh2, hw2, hh2+28);
      }
      ctx.fillStyle = strike? 'rgba(120,110,170,0.25)' : 'rgba(120,140,160,0.10)';
      ctx.fillRect(0, GROUND_Y-46, VW, 8);                        // mist band over the hills
      // far misty tree line (silhouette)
      mkPines(px, GROUND_Y-8, strike? '#3a3252':'#121a28', 1000);
      // mid-distance broadleaf line with round canopies
      for(let i=0;i<9;i++){
        const bx = ((i*122+60 + px*0.72) % 1098 + 1098) % 1098 - 100;
        if(bx<-40||bx>VW+40) continue;
        const bh = 32 + (i*29)%22;
        ctx.fillStyle = strike? '#352f54' : '#0b1220';
        ctx.fillRect(Math.round(bx)+7, GROUND_Y-bh+12, 3, bh-12);
        ctx.fillRect(Math.round(bx)-4, GROUND_Y-bh, 24, 10);
        ctx.fillRect(Math.round(bx), GROUND_Y-bh-5, 16, 6);
        ctx.fillRect(Math.round(bx)-8, GROUND_Y-bh+8, 32, 7);
      }
      // mid broadleaf trees — short thick leaning trunks under big rounded canopies
      for(let i=0;i<5;i++){
        const tx = Math.round(((i*170+40 + px2) % 900 + 900) % 900 - 120);
        if(tx<-70||tx>VW+70) continue;
        const th2 = 34 + (i*17)%14;              // short trunk height
        const lean = (i%2? 1:-1) * 3;            // slight lean like the reference
        const topY = GROUND_Y - th2;
        // trunk: thick, tapering, leaning
        ctx.fillStyle = strike? '#5a4e7a' : '#141c2a';
        ctx.fillRect(tx-5, GROUND_Y-7, 14, 7);                 // root flare
        ctx.fillRect(tx-3, GROUND_Y-Math.round(th2*0.55), 10, Math.round(th2*0.55));
        ctx.fillRect(tx-2+lean, topY, 8, Math.round(th2*0.6));
        ctx.fillRect(tx+lean*2, topY-5, 6, 9);                 // trunk tip reaching into canopy
        // low branches poking out from under the canopy
        ctx.fillRect(tx-13+lean, topY+2, 11, 3); ctx.fillRect(tx+6+lean, topY+5, 12, 3);
        // canopy: broad layered dome, much wider than it is tall
        const cw = 34 + (i*13)%10;               // canopy half-width
        const cx2 = tx + lean*2 + 2;
        const cb = topY - 3;                     // canopy bottom edge
        ctx.fillStyle = strike? '#2a3822' : '#060f09';         // dark underside
        ctx.fillRect(cx2-cw, cb-11, cw*2, 12);
        ctx.fillRect(cx2-cw+6, cb-1, cw*2-12, 5);              // drooping lower lobes
        ctx.fillStyle = strike? '#33422a' : '#08130c';         // mid layer + side lobes
        ctx.fillRect(cx2-cw+4, cb-21, cw*2-8, 12);
        ctx.fillRect(cx2-cw-4, cb-15, 9, 9); ctx.fillRect(cx2+cw-5, cb-16, 9, 9);
        ctx.fillStyle = strike? '#3d4f33' : '#0b1a10';         // upper layer
        ctx.fillRect(cx2-cw+10, cb-29, cw*2-20, 10);
        ctx.fillRect(cx2-7, cb-33, 17, 6);                     // rounded crown clump
        ctx.fillStyle = strike? '#4a5f3e' : '#0e2114';         // leafy highlight clumps
        ctx.fillRect(cx2-cw+14, cb-27, 10, 4); ctx.fillRect(cx2+4, cb-31, 9, 4);
        ctx.fillRect(cx2-2, cb-23, 12, 3);
        // moss/vine strands hanging off the canopy edges
        ctx.fillStyle = strike? '#2a3822' : '#0a1810';
        ctx.fillRect(cx2-cw+8, cb+3, 2, 8); ctx.fillRect(cx2+cw-10, cb+2, 2, 10);
        ctx.fillRect(cx2+3, cb+4, 2, 6);
      }
      // swamp water sheen along the base, reflecting flashes
      for(let xx=0;xx<VW;xx+=4){
        const wob = Math.round(Math.sin((xx+camx)*0.09+gtime*1.5)*1.2);
        ctx.fillStyle = strike? 'rgba(200,190,255,0.5)' : 'rgba(50,90,70,0.5)';
        ctx.fillRect(xx, GROUND_Y-5+wob, 4, 5-wob);
      }
      // will-o'-wisps drifting over the marsh
      for(let i=0;i<6;i++){
        const wxr = ((i*97 + Math.sin(gtime*0.5+i*2)*30 + px2) % (VW+60) + VW+60) % (VW+60) - 30;
        const wy = GROUND_Y-22 - (i*13)%38 + Math.sin(gtime*1.3+i)*4;
        if(Math.sin(gtime*2.4+i*1.7) > -0.2){
          ctx.fillStyle = i%2? 'rgba(140,220,180,0.16)' : 'rgba(140,200,255,0.16)';
          ctx.fillRect(Math.round(wxr)-1, Math.round(wy)-1, 4, 4);
          ctx.fillStyle = i%2? 'rgba(150,230,190,0.65)' : 'rgba(150,210,255,0.6)';
          ctx.fillRect(Math.round(wxr), Math.round(wy), 2, 2);
        }
      }
      // drifting fog banks
      for(let i=0;i<4;i++){
        const fxx = ((i*180 + t*(6+i*2)) % (VW+140)) - 70;
        ctx.fillStyle = i%2? 'rgba(150,170,180,0.10)' : 'rgba(130,150,175,0.07)';
        ctx.fillRect(Math.round(fxx), GROUND_Y-28-(i*11), 130, 15);
      }
      // rain streaks
      for(let i=0;i<40;i++){
        const rx = ((i*29 + gtime*160) % (VW+30)) - 15;
        const ry = ((i*53 + gtime*300) % (GROUND_Y+20)) - 10;
        ctx.fillStyle = warn||strike? 'rgba(200,200,230,0.5)':'rgba(150,170,200,0.35)';
        ctx.fillRect(Math.round(rx), Math.round(ry), 1, 4);
      }
      // LIGHTNING BOLTS striking the ground during a strike — always beside a shelter, never behind it
      if(strike){
        const seed = Math.floor(L.t / (L.def.flare.safe+L.def.flare.warn+L.def.flare.burst));
        // covers currently visible on screen
        const covers = [];
        for(const h of L.def.hazards){
          if(h.type!=='cover') continue;
          const sx = h.x - camx;
          if(sx > -70 && sx < VW+70) covers.push(h);
        }
        const nb = Math.min(3, covers.length*2);
        for(let b=0;b<nb;b++){
          const rng = makeRng(seed*97 + b*31 + 7);
          const cv = covers[Math.floor(rng()*covers.length)];
          const side = rng()<0.5 ? -1 : 1;
          const off = 18 + rng()*24;
          // world x just outside the cover's roof (roof overhangs by ~8px each side)
          const wx = side<0 ? cv.x - 8 - off : cv.x + cv.w + 8 + off;
          let lx = wx - camx;
          if(lx < 6 || lx > VW-6) continue; // off screen — skip this bolt
          let ly = 0;
          ctx.fillStyle = '#ffffff';
          const segs = 16;
          for(let s=0;s<segs;s++){
            const nx = lx + (rng()-0.5)*10;
            const ny = ly + (GROUND_Y)/segs;
            // thick white core
            ctx.fillStyle = '#f4eeff';
            ctx.fillRect(Math.round(Math.min(lx,nx)), Math.round(ly), Math.max(2, Math.abs(nx-lx))|0 || 2, Math.ceil(ny-ly)+1);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(Math.round(nx), Math.round(ly), 2, Math.ceil(ny-ly)+1);
            // occasional fork
            if(rng()<0.3){
              ctx.fillStyle = 'rgba(230,220,255,0.8)';
              ctx.fillRect(Math.round(nx)+ (rng()<0.5?-6:6), Math.round(ny), 2, 8);
            }
            lx = nx; ly = ny;
          }
          // ground flash where it lands
          ctx.fillStyle = 'rgba(230,220,255,0.6)';
          ctx.fillRect(Math.round(lx)-8, GROUND_Y-4, 16, 4);
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          ctx.fillRect(Math.round(lx)-3, GROUND_Y-6, 6, 6);
        }
      }
      break;
    }
    case 'ice': {
      // AURORA — flowing horizontal curtains of light across the upper sky
      (function(){
        const bands = [
          {baseY:24, amp:10, col1:'110,240,170', col2:'170,255,210', spd:0.6, len:0.020},
          {baseY:40, amp:14, col1:'120,200,255', col2:'190,225,255', spd:0.42, len:0.016},
          {baseY:58, amp:12, col1:'180,120,240', col2:'220,180,255', spd:0.75, len:0.024}
        ];
        for(const b of bands){
          for(let sx=0; sx<VW; sx+=3){
            const wave = Math.sin(sx*b.len + t*b.spd) * b.amp
                       + Math.sin(sx*b.len*2.3 + t*b.spd*1.7) * b.amp*0.4;
            const yTop = b.baseY + wave;
            // vertical light ray hanging down from the curtain, fading
            const h = 26 + Math.sin(sx*0.03 + t*0.9)*10;
            const shimmer = 0.5 + 0.5*Math.sin(sx*0.05 - t*2.2);
            for(let yy=0; yy<h; yy+=2){
              const fade = (1 - yy/h) * (0.10 + shimmer*0.14);
              ctx.fillStyle = 'rgba('+b.col1+','+fade.toFixed(3)+')';
              ctx.fillRect(sx, Math.round(yTop+yy), 3, 2);
            }
            // bright crest along the top edge
            ctx.fillStyle = 'rgba('+b.col2+','+(0.35+shimmer*0.35).toFixed(3)+')';
            ctx.fillRect(sx, Math.round(yTop), 3, 2);
          }
        }
      })();
      ctx.fillStyle = '#4c6494';
      for(let i=0;i<6;i++){
        const mx = ((i*150+40 + px) % 900 + 900) % 900 - 150;
        mkPeak(mx, 48+(i*13)%20, 52+(i*17)%18, GROUND_Y);
      }
      ctx.fillStyle = '#dceafc';
      for(let i=0;i<6;i++){
        const mx = ((i*150+40 + px) % 900 + 900) % 900 - 150;
        const ph2 = 52+(i*17)%18;
        ctx.fillRect(mx-3, GROUND_Y-ph2+3, 8, 2); ctx.fillRect(mx-1, GROUND_Y-ph2, 4, 3);
      }
      mkPines(px2, GROUND_Y, '#1c3050', 1000);
      for(let i=0;i<12;i++){
        const sx = ((i*41 + hsh(i)*30 + t*6) % (VW+20)) - 10 + Math.sin(t+i)*3;
        const sy = ((t*26 + i*37) % (GROUND_Y+16)) - 8;
        ctx.fillStyle = 'rgba(240,248,255,0.85)';
        ctx.fillRect(Math.round(sx), Math.round(sy), 1, 1);
      }
      break;
    }
    case 'rooftops': {
      // moon + clouds
      drawPlanet(400+px*0.3, 40, 12, '#dfe4ea', '#f4f7fa');
      for(let i=0;i<3;i++){
        const cxx = ((i*230+40 + px*0.5 + t*3) % 760 + 760) % 760 - 140;
        mkCloud(cxx, 28+(i*29)%40, i===1?1.3:0.9, '#3a4568', '#2a3350', '#1c2440');
      }
      // FAR layer: tall vague skyscraper silhouettes, hazy — clearly background
      for(let i=0;i<Math.ceil(VW/38)+4;i++){
        const bx = ((i*38 + px*0.6) % (VW+152) + (VW+152)) % (VW+152) - 38;
        const bh = 70 + Math.floor(hsh(i+80)*80);
        ctx.fillStyle = '#161e3a';
        ctx.fillRect(Math.round(bx), GROUND_Y-bh, 30, bh);
        // vague sparse windows, dim
        for(let wl=0; wl<10; wl++){
          if(hsh(i*11+wl+300)>0.78){
            ctx.fillStyle = 'rgba(143,224,255,0.35)';
            ctx.fillRect(Math.round(bx)+4+(wl%3)*9, GROUND_Y-bh+8+Math.floor(wl/3)*15, 3, 4);
          }
        }
      }
      // atmospheric haze band to separate far from mid
      ctx.fillStyle = 'rgba(30,40,70,0.35)'; ctx.fillRect(0, GROUND_Y-70, VW, 70);
      // MID layer: blockier towers, a few with antennae/beacons
      for(let i=0;i<Math.ceil(VW/56)+3;i++){
        const bx = ((i*56 + px) % (VW+168) + (VW+168)) % (VW+168) - 56;
        const bh = 40 + Math.floor(hsh(i+5)*56);
        ctx.fillStyle = '#1c2848';
        ctx.fillRect(Math.round(bx), GROUND_Y-bh, 44, bh);
        ctx.fillStyle = '#141c34'; ctx.fillRect(Math.round(bx), GROUND_Y-bh, 44, 2);
        if(hsh(i+90)>0.6){
          ctx.fillStyle = '#1c2848'; ctx.fillRect(Math.round(bx)+20, GROUND_Y-bh-9, 3, 9);
          ctx.fillStyle = Math.sin(gtime*3+i)>0? '#ff5a54':'#5c2020';
          ctx.fillRect(Math.round(bx)+20, GROUND_Y-bh-11, 3, 2);
        }
        for(let wl=0; wl<6; wl++){
          if(hsh(i*13+wl)>0.62){
            ctx.fillStyle = hsh(i*7+wl)>0.5? 'rgba(255,212,78,0.55)' : 'rgba(143,224,255,0.5)';
            ctx.fillRect(Math.round(bx)+5+(wl%3)*13, GROUND_Y-bh+8+Math.floor(wl/3)*15, 4, 5);
          }
        }
      }
      // haze in front of the mid layer, so foreground buildings read as separate & closest
      ctx.fillStyle = 'rgba(20,26,48,0.30)'; ctx.fillRect(0, GROUND_Y-40, VW, 40);
      break;
    }
    case 'facility': {
      ctx.fillStyle = '#f6f8fa'; ctx.fillRect(0,0,VW,26);
      ctx.fillStyle = '#c8ced8'; ctx.fillRect(0,25,VW,1);
      for(let i=0;i<6;i++){
        const lx = 16 + i*84 - (camx*0.15)%84;
        ctx.fillStyle = '#e0fdfa'; ctx.fillRect(Math.round(lx), 8, 40, 6);
        ctx.fillStyle = 'rgba(190,250,245,0.30)'; ctx.fillRect(Math.round(lx)-3, 14, 46, 4);
      }
      ctx.fillStyle = '#d4dae2';
      for(let s=0-((camx*0.3)%64); s<VW; s+=64) ctx.fillRect(Math.round(s),26,2,GROUND_Y-26);
      ctx.fillRect(0, 96, VW, 2); ctx.fillRect(0, 168, VW, 2);
      for(let i=0;i<4;i++){
        const txx = ((i*240+70 + px2*2) % 960 + 960) % 960 - 100;
        const ty = GROUND_Y-78;
        ctx.fillStyle = '#9aa4b4'; ctx.fillRect(txx-2, ty-6, 34, 6);
        ctx.fillStyle = 'rgba(110,230,190,0.45)'; ctx.fillRect(txx, ty, 30, 68);
        ctx.fillStyle = 'rgba(200,255,235,0.35)'; ctx.fillRect(txx+3, ty, 4, 68);
        for(let b2=0;b2<4;b2++){
          const bby = ty+64 - ((gtime*18 + b2*19 + i*7) % 62);
          ctx.fillStyle = 'rgba(230,255,245,0.8)';
          ctx.fillRect(txx+6+((b2*9+i*5)%20), Math.round(bby), 2, 2);
        }
        ctx.fillStyle = '#9aa4b4'; ctx.fillRect(txx-2, ty+68, 34, 8);
        ctx.fillStyle = '#6d7688'; ctx.fillRect(txx-2, ty+73, 34, 3);
      }
      for(let i=0;i<3;i++){
        const mxx = ((i*300+180 + px2*2) % 900 + 900) % 900 - 100;
        const my = 104;
        ctx.fillStyle = '#39415a'; ctx.fillRect(mxx-2, my-2, 44, 28);
        ctx.fillStyle = '#0a1a14'; ctx.fillRect(mxx, my, 40, 24);
        ctx.fillStyle = '#57e8a0';
        for(let xx=0;xx<38;xx+=2){
          const yy = my+12 + Math.round(Math.sin((xx+gtime*40+i*30)*0.5)*6*(hsh(Math.floor((xx+gtime*40)/8)+i)>0.4?1:0.3));
          ctx.fillRect(mxx+1+xx, yy, 2, 2);
        }
      }
      // service shaft darkness below the floor line (pits read as pits)
      ctx.fillStyle = '#343c4c'; ctx.fillRect(0, GROUND_Y, VW, VH-GROUND_Y);
      ctx.fillStyle = '#262c3a'; ctx.fillRect(0, GROUND_Y, VW, 3);
      if(Math.sin(gtime*4)>0.2){
        const bxx = ((260 + px2*2) % 900 + 900) % 900 - 100;
        ctx.fillStyle = '#ff5a54'; ctx.fillRect(bxx, 30, 6, 4);
        ctx.fillStyle = 'rgba(255,90,84,0.25)'; ctx.fillRect(bxx-4, 28, 14, 8);
      }
      break;
    }
    case 'backrooms':
      drawBackroomsRoom(camx, t, {});
      break;
  }
}

/* per-theme decoration along the ground platforms */
function drawGroundDecor(theme, camx){
  for(const p of L.platforms){
    if(!p.ground || p.dead) continue;
    for(let i=Math.ceil(p.x/22)*22; i<p.x+p.w-6; i+=22){
      const x = Math.round(i-camx);
      if(x<-12||x>VW+12) continue;
      const r = hsh(i*0.37), y = p.y;
      switch(theme){
        case 'meadow':
          if(r<0.5){
            ctx.fillStyle = '#4f9c3c'; ctx.fillRect(x, y-3, 1, 3); ctx.fillRect(x+2, y-4, 1, 4);
            ctx.fillStyle = r<0.25? '#f2a0c8':'#e06aa8'; ctx.fillRect(x, y-6, 3, 3);
            ctx.fillStyle = '#fdf6f9'; ctx.fillRect(x+1, y-5, 1, 1);
          } else if(r<0.75){
            ctx.fillStyle = '#5fa843'; ctx.fillRect(x, y-3, 2, 3); ctx.fillRect(x+3, y-2, 2, 2); ctx.fillRect(x+6, y-4, 2, 4);
          }
          break;
        case 'moon':
          if(r<0.4){
            ctx.fillStyle = '#6d7488'; ctx.fillRect(x, y+6, 12, 2); ctx.fillRect(x+2, y+5, 8, 1);
            ctx.fillStyle = '#565c70'; ctx.fillRect(x+2, y+7, 8, 1);
          }
          break;
        case 'caverns':
          // (decorative ground crystals removed — the only crystals on the floor are hazards)
          break;
        case 'redplanet':
          if(r<0.4){ ctx.fillStyle = '#7c351c'; ctx.fillRect(x, y-3, 6, 3); ctx.fillRect(x+1, y-4, 3, 1); }
          break;
        case 'deep':
          if(r<0.35){
            const cc = ['#ff9a3c','#f47fb4','#57e8d4'][Math.floor(r*8.5)%3];
            ctx.fillStyle = cc; ctx.fillRect(x, y-4, 3, 4); ctx.fillRect(x+4, y-3, 2, 3); ctx.fillRect(x+2, y-6, 2, 2);
          } else if(r<0.6){
            ctx.fillStyle = '#2f8a54';
            const sway = Math.round(Math.sin(gtime*2+i)*1.5);
            ctx.fillRect(x, y-3, 1, 3); ctx.fillRect(x+sway, y-7, 1, 4); ctx.fillRect(x+sway, y-9, 1, 2);
          }
          break;
        case 'ember':
          if(r<0.4){
            const gl = Math.sin(gtime*3+i)>0;
            ctx.fillStyle = gl? '#ffd44e':'#ff7a2e'; ctx.fillRect(x, y+5, 5, 1);
            ctx.fillStyle = '#ff7a2e'; ctx.fillRect(x+2, y+3, 1, 2);
          }
          break;
        case 'swamp':
          if(r<0.4){
            // cattail reeds
            ctx.fillStyle = '#3c6444';
            const sway = Math.round(Math.sin(gtime*1.5+i)*1.5);
            ctx.fillRect(x, y-9, 1, 9); ctx.fillRect(x+sway, y-13, 1, 5);
            ctx.fillStyle = '#6b4a2e'; ctx.fillRect(x+sway-1, y-14, 3, 4);
            ctx.fillStyle = '#2c5a34'; ctx.fillRect(x+4, y-6, 1, 6);
          } else if(r<0.6){
            // glowing swamp mushroom
            ctx.fillStyle = '#2c5a34'; ctx.fillRect(x+2, y-3, 1, 3);
            ctx.fillStyle = Math.sin(gtime*2+i)>0? '#8fe0ff':'#57c8a0';
            ctx.fillRect(x, y-5, 5, 2); ctx.fillRect(x+1, y-6, 3, 1);
          } else if(r<0.72){
            // lily pad on the water
            ctx.fillStyle = '#2f6a44'; ctx.fillRect(x, y+4, 8, 2);
            ctx.fillStyle = '#3c8654'; ctx.fillRect(x+1, y+4, 6, 1);
          }
          break;
        case 'ice':
          if(r<0.4){ ctx.fillStyle = '#f2f7ff'; ctx.fillRect(x, y-2, 7, 2); ctx.fillRect(x+2, y-3, 3, 1); }
          break;
        case 'rooftops':
          if(r<0.3){
            ctx.fillStyle = '#4c5876'; ctx.fillRect(x, y-6, 8, 6);
            ctx.fillStyle = '#6a7694'; ctx.fillRect(x+1, y-5, 6, 1);
          } else if(r<0.5){
            ctx.fillStyle = '#6a7694'; ctx.fillRect(x+3, y-9, 1, 9); ctx.fillRect(x+1, y-9, 5, 1);
          }
          break;
        case 'facility':
          // caution tape striped along the top edge of the floor itself
          ctx.fillStyle = '#ffd44e'; ctx.fillRect(x, y, 11, 5);
          ctx.fillStyle = '#232a40'; ctx.fillRect(x+11, y, 11, 5);
          if(r<0.5){ ctx.fillStyle = '#d4dae2'; ctx.fillRect(x+4, y+8, 2, 8); }
          break;
      }
    }
  }
}

function flarePhase(){
  const def = L && L.def;
  if(!def || def.mechanic!=='flares') return 'safe';
  const f = def.flare, cyc = f.safe+f.warn+f.burst, ph = L.t % cyc;
  if(ph < f.safe) return 'safe';
  if(ph < f.safe+f.warn) return 'warn';
  return 'burst';
}

/* ---------- world drawing ---------- */
function drawPlatform(p, th, camx){
  if(p.dead) return;
  const x = Math.round(p.x-camx), y = Math.round(p.y);
  if(p.ground){
    ctx.fillStyle = th.gFill; ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = th.gTop;  ctx.fillRect(x, y, p.w, 4);
    ctx.fillStyle = th.gDot;
    for(let i=8;i<p.w-6;i+=26){
      ctx.fillRect(x+i, y+12+(i%3)*8, 6, 3);
      ctx.fillRect(x+i+10, y+26+(i%2)*6, 4, 2);
    }
    return;
  }
  if(p.type==='crumble'){
    let ox=0, oy=0;
    if(p.crumbT>=0 && p.crumbT<0.45){ ox = Math.round(Math.sin(p.crumbT*60))*1; }
    const CK = L.def.theme==='moon' ? ['#8b93a6','#c7ccd8','#565c70'] :
               L.def.theme==='deep' ? [th.gFill, th.gTop, th.gDot] :
                                      ['#7a6248','#a88860','#4e3d2c'];
    ctx.fillStyle = CK[0]; ctx.fillRect(x+ox, y, p.w, p.h);
    ctx.fillStyle = CK[1]; ctx.fillRect(x+ox, y, p.w, 3);
    ctx.fillStyle = CK[2];
    ctx.fillRect(x+ox+3, y+5, 2, 4); ctx.fillRect(x+ox+p.w-7, y+4, 2, 5);
    ctx.fillRect(x+ox+Math.floor(p.w/2), y+3, 2, 6);
    return;
  }
  if(p.type==='moving'){
    ctx.fillStyle = '#4a72b8'; ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#8fb2f0'; ctx.fillRect(x, y, p.w, 3);
    ctx.fillStyle = '#57e8d4'; ctx.fillRect(x+2, y+p.h-3, 3, 2); ctx.fillRect(x+p.w-5, y+p.h-3, 3, 2);
    return;
  }
  // rooftops theme: one-way platforms are building tops, with a lit facade dropping below
  if(L.def.theme==='rooftops' && p.oneway){
    const faceH = VH - y;                     // facade runs to the bottom of the screen
    ctx.fillStyle = '#2a3350'; ctx.fillRect(x, y+4, p.w, faceH);        // building body
    ctx.fillStyle = '#1c2440'; ctx.fillRect(x, y+4, 2, faceH); ctx.fillRect(x+p.w-2, y+4, 2, faceH); // side shade
    ctx.fillStyle = '#3a4568'; ctx.fillRect(x, y, p.w, 5);              // roof slab
    ctx.fillStyle = '#5a6890'; ctx.fillRect(x, y, p.w, 2);              // roof highlight
    ctx.fillStyle = '#2a3350'; ctx.fillRect(x+3, y-3, 5, 3); ctx.fillRect(x+p.w-9, y-4, 5, 4); // parapet bumps / vents
    // lit windows on the facade (keyed to world coords so they don't flicker as the camera moves)
    for(let wy=y+12; wy<y+4+faceH-6; wy+=14){
      for(let wo=4; wo<p.w-6; wo+=12){
        const wwx = Math.round(p.x)+wo;
        const lit = hsh(wwx*3+wy) > 0.45;
        ctx.fillStyle = lit ? (hsh(wwx+wy)>0.5? '#ffd44e':'#8fe0ff') : '#141c30';
        ctx.fillRect(x+wo, wy, 6, 7);
      }
    }
    return;
  }
  // solid rock/metal
  ctx.fillStyle = th.gFill; ctx.fillRect(x, y, p.w, p.h);
  ctx.fillStyle = th.gTop;  ctx.fillRect(x, y, p.w, 3);
  ctx.fillStyle = th.gDot;  ctx.fillRect(x+2, y+p.h-3, p.w-4, 2);
}

function drawHazard(h, camx){
  const x = Math.round(h.x-camx);
  switch(h.type){
    case 'spike':
      ctx.fillStyle = L.def.theme==='caverns' ? '#c2a06a' : '#c9d2e0';
      for(let i=0;i<h.w;i+=8){
        ctx.beginPath();
        ctx.moveTo(x+i, h.y+h.h); ctx.lineTo(x+i+4, h.y); ctx.lineTo(x+i+8, h.y+h.h);
        ctx.fill();
      }
      break;
    case 'fire': {
      for(let i=0;i<h.w;i+=6){
        const fh = 6 + Math.floor((Math.sin(gtime*9 + i)*0.5+0.5)*7);
        ctx.fillStyle = '#ff9a3c'; ctx.fillRect(x+i, h.y+h.h-fh, 5, fh);
        ctx.fillStyle = '#ffd44e'; ctx.fillRect(x+i+1, h.y+h.h-Math.max(2,fh-4), 3, Math.max(2,fh-4));
      }
      break;
    }
    case 'crystals': {
      // clusters of sharp crystals rising from the floor — touching them hurts.
      // fully static: randomized size/color per cluster, seeded on world position.
      for(let i=7, k=0; i<h.w; i+=14, k++){
        const pal = Math.floor(hsh(h.x*3 + i)*7);
        const sc  = 0.85 + hsh(h.x*7 + i)*0.5;
        mkCrystalCluster(x+i, h.y+h.h, sc, pal, true, h.x + i);
      }
      break;
    }
    case 'wire': {
      const cav = L.def.theme==='caverns';
      ctx.fillStyle = cav? '#5c4128' : '#39415a'; ctx.fillRect(x+1, h.y+h.h-6, 4, 6);
      if(cav){ ctx.fillStyle = '#b06ce8'; ctx.fillRect(x, h.y+h.h-9, 6, 4); }
      const zz = Math.sin(gtime*20+h.x)>0;
      ctx.fillStyle = cav? (zz? '#e8d2ff':'#b06ce8') : (zz? '#8fe0ff':'#57e8d4');
      for(let i=0;i<h.h-4;i+=4) ctx.fillRect(x + (i%8===0?0:2), h.y+i, 3, 3);
      if(zz){ ctx.fillStyle='#fff'; ctx.fillRect(x-2, h.y+2, 2,2); ctx.fillRect(x+6, h.y+10, 2,2); }
      break;
    }
    case 'mine': {
      const by = Math.round(h.y + Math.sin(L.t*2 + h.x*0.05)*3);
      const icy = L.def.theme==='ice';
      ctx.fillStyle = icy? '#dceafc':'#5a6377'; ctx.fillRect(x+2, by+2, 6, 6);
      ctx.fillStyle = icy? '#f6faff':'#98a1b3'; ctx.fillRect(x+3, by+3, 3, 3);
      ctx.fillStyle = icy? '#84a0c4':'#5a6377';
      ctx.fillRect(x+4, by-1, 2, 3); ctx.fillRect(x+4, by+8, 2, 3);
      ctx.fillRect(x-1, by+4, 3, 2); ctx.fillRect(x+8, by+4, 3, 2);
      const blink = Math.sin(gtime*7 + h.x)>0.2;
      ctx.fillStyle = icy? (blink? '#8fe0ff':'#3f6fa8') : (blink? '#ff5a54':'#7a2c2c');
      ctx.fillRect(x+4, by+4, 2, 2);
      break;
    }
    case 'laser': {
      const on = laserOn(h, L.t), warn = laserWarn(h, L.t);
      const icy = L.def.theme==='ice';
      ctx.fillStyle = icy? '#8aa4c4':'#39415a';
      ctx.fillRect(x-2, h.y-6, 8, 6); ctx.fillRect(x-2, h.y+h.h, 8, 6);
      if(on){
        ctx.fillStyle = icy? '#bfe8ff':'#ff5a54'; ctx.fillRect(x, h.y, h.w, h.h);
        ctx.fillStyle = icy? '#ffffff':'#ffd2c8'; ctx.fillRect(x+1, h.y, 1, h.h);
      } else if(warn){
        ctx.fillStyle = icy? 'rgba(190,230,255,0.4)':'rgba(255,90,84,0.35)';
        ctx.fillRect(x+1, h.y, 2, h.h);
      }
      break;
    }
    case 'cover': {
      if(L.def.theme==='swamp'){
        // a broad oak like the reference: wide clumpy crown low over a short,
        // thick, leaning trunk, wide roots
        const lit = flarePhase()==='burst';
        const seed = h.x*0.37;
        const mx = x + h.w/2;
        const cyTop = 132, cyBot = 174;                    // shallow crown → wide, flat canopy
        // --- trunk first (crown overlaps its top): thick, tapered, gnarled S-curve ---
        for(let yy=cyBot-10; yy<GROUND_Y; yy+=2){
          const p = (yy-(cyBot-10))/(GROUND_Y-(cyBot-10));
          const tw = 12 + Math.round(p*6);                 // widens toward the base
          const cxr = mx - Math.round(8*Math.pow(1-p,1.5) - 3*Math.sin((1-p)*5+seed)); // curving lean
          ctx.fillStyle = '#503620'; ctx.fillRect(cxr-(tw>>1), yy, tw, 2);
          ctx.fillStyle = '#75522f'; ctx.fillRect(cxr-(tw>>1)+1, yy, 3, 2);   // lit left side
          ctx.fillStyle = '#281809'; ctx.fillRect(cxr+(tw>>1)-2, yy, 2, 2);   // shaded right edge
        }
        // forked limb splitting off up-right into the leaves
        for(let yy=GROUND_Y-14; yy>cyBot-12; yy-=2){
          const p = (GROUND_Y-14-yy)/24;
          const fx = mx+4 + Math.round(p*10);
          ctx.fillStyle = '#503620'; ctx.fillRect(fx, yy, 5, 3);
          ctx.fillStyle = '#281809'; ctx.fillRect(fx+3, yy, 2, 3);
        }
        // bark grooves, knot, a touch of moss
        ctx.fillStyle = '#281809';
        ctx.fillRect(mx-2, cyBot+8+((h.x*3)%8), 1, 9); ctx.fillRect(mx+1, cyBot+2, 1, 7);
        ctx.fillRect(mx-4, cyBot+12+((h.x*7)%6), 2, 2);
        ctx.fillStyle = '#2c5a34'; ctx.fillRect(mx-7, GROUND_Y-14+((h.x*5)%6), 2, 5);
        // wide root flares gripping the mud
        ctx.fillStyle = '#503620';
        ctx.fillRect(mx-14, GROUND_Y-5, 28, 5);
        ctx.fillRect(mx-22, GROUND_Y-3, 44, 3);
        ctx.fillStyle = '#281809';                         // darker roots crossing in front
        ctx.fillRect(mx-22, GROUND_Y-2, 8, 2); ctx.fillRect(mx+15, GROUND_Y-2, 8, 2);
        ctx.fillRect(mx-6, GROUND_Y-7, 5, 3); ctx.fillRect(mx+4, GROUND_Y-6, 4, 2);
        ctx.fillStyle = '#75522f'; ctx.fillRect(mx-12, GROUND_Y-4, 5, 2);
        // --- the crown: a broad flat canopy, far wider than it is tall ---
        const cwHalf = h.w/2 + 22;                         // spreads well past the safe zone
        const prof = v => {
          let wf;
          if(v<0.18)      wf = 0.66 + (v/0.18)*0.34;       // quick flare out from the flat top
          else if(v<0.62) wf = 1.0 + 0.04*Math.sin(v*11+seed); // long, level widest band
          else            wf = 1.0 - (v-0.62)*1.15;        // undercut toward the trunk
          return Math.max(0.25, wf);
        };
        // reference-style mottled shading: the crown reads as leaf noise — small
        // chunky patches scattered over a soft light-to-dark gradient, light
        // pooling on top and dark pockets tucked through the body. Natural greens.
        const HI='#77b463', LT='#569a4a', MID='#4c8c46', DK='#3d7a3a';
        const DP='#2f6533', DP2='#234f2b', SH='#1c4436', SH2='#173a2c';
        // silhouette pass: solid crown with a soft vertical gradient
        for(let yy=cyTop; yy<cyBot; yy+=3){
          const v = (yy-cyTop)/(cyBot-cyTop);
          const wf = prof(v);
          const jl = Math.floor(hsh(seed+yy*3)*5)-2, jr = Math.floor(hsh(seed+yy*7)*5)-2;
          const lx = Math.round(mx - cwHalf*wf) + jl;
          const rx = Math.round(mx + cwHalf*wf) + jr;
          ctx.fillStyle = v<0.30? MID : (v<0.62? DK : DP2);
          ctx.fillRect(lx, yy, rx-lx, 3);
        }
        // clump passes: same rects as always (they define the bumpy outline),
        // recolored to sit inside the mottled gradient
        const clump = (cxm, cyy, cwd, top, body) => {
          ctx.fillStyle = body; ctx.fillRect(cxm-(cwd>>1)+1, cyy-2, cwd-2, 3);
          ctx.fillStyle = body; ctx.fillRect(cxm-(cwd>>1),   cyy+1, cwd,   3);
          ctx.fillStyle = DP2;  ctx.fillRect(cxm-(cwd>>1)+2, cyy+4, cwd-4, 2);
          ctx.fillStyle = top;  ctx.fillRect(cxm-(cwd>>1)+3, cyy-4, cwd-6, 3);
        };
        for(let i=0;i<11;i++){                             // big clusters filling the body
          const cv = 0.14 + hsh(seed+i*61)*0.72;
          const cyy = Math.round(cyTop + cv*(cyBot-cyTop));
          const cwd = 18 + Math.floor(hsh(seed+i*67)*16);
          const cxm = Math.round(mx + (hsh(seed+i*71)*2-1)*Math.max(4, cwHalf*prof(cv)*0.92 - cwd/2));
          const lv = cv*0.72 + (hsh(seed+i*83)-0.5)*0.3;
          const top  = lv<0.36? LT : (lv<0.64? MID : DK);
          const body = lv<0.36? MID : (lv<0.64? DK : DP);
          clump(cxm, cyy, cwd, top, body);
        }
        for(let i=0;i<9;i++){                              // clumps bumping along the flat top
          const cwd = 18 + Math.floor(hsh(seed+i*19)*14);
          const cxm = Math.round(mx + (hsh(seed+i*23)*2-1)*cwHalf*0.82);
          clump(cxm, cyTop+((i*3)%5)-2, cwd, LT, MID);
        }
        // mottle pass: many small leaf patches; tone odds shift with depth so the
        // tiers dissolve into each other as noise instead of hard bands
        for(let i=0;i<140;i++){
          const v = hsh(seed+i*17.3);
          const yy = Math.round(cyTop + v*(cyBot-cyTop-5));
          const half = Math.max(4, cwHalf*prof(v) - 2);
          const xm = mx + (hsh(seed+i*23.7)*2-1)*half;
          const bw = 3 + Math.floor(hsh(seed+i*31.1)*4);
          const bh = 2 + (hsh(seed+i*37.9)<0.4? 1:0);
          const x0 = Math.round(Math.max(xm-bw/2, mx-half));
          const x1 = Math.round(Math.min(xm+bw/2, mx+half));
          if(x1<=x0) continue;
          const r = hsh(seed+i*43.7);
          let c;
          if(v<0.26)      c = r<0.34? HI : (r<0.72? LT : MID);
          else if(v<0.52) c = r<0.16? LT : (r<0.52? MID : (r<0.82? DK : DP));
          else if(v<0.78) c = r<0.30? DK : (r<0.68? DP : DP2);
          else            c = r<0.38? DP2 : (r<0.72? SH : DP);
          ctx.fillStyle = c;
          ctx.fillRect(x0, yy, x1-x0, bh);
        }
        // dark shadow pockets tucked between the leaf masses (like the reference)
        for(let i=0;i<7;i++){
          const v = 0.32 + hsh(seed+i*53.3)*0.44;
          const yy = Math.round(cyTop + v*(cyBot-cyTop));
          const half = cwHalf*prof(v) - 4;
          const xm = mx + (hsh(seed+i*59.9)*2-1)*half*0.9;
          const bw = 6 + Math.floor(hsh(seed+i*61.7)*7);
          const x0 = Math.round(Math.max(xm-bw/2, mx-half));
          const x1 = Math.round(Math.min(xm+bw/2, mx+half));
          if(x1<=x0) continue;
          ctx.fillStyle = i%2? DP2 : '#1d4023';
          ctx.fillRect(x0, yy, x1-x0, 3);
        }
        // light pooling along the top of the crown
        for(let i=0;i<8;i++){
          const v = hsh(seed+i*67.1)*0.14;
          const yy = Math.round(cyTop + v*(cyBot-cyTop));
          const half = cwHalf*prof(v) - 3;
          const xm = mx + (hsh(seed+i*71.3)*2-1)*half*0.85;
          const bw = 5 + Math.floor(hsh(seed+i*73.9)*6);
          const x0 = Math.round(Math.max(xm-bw/2, mx-half));
          const x1 = Math.round(Math.min(xm+bw/2, mx+half));
          if(x1<=x0) continue;
          ctx.fillStyle = i%3? HI : LT;
          ctx.fillRect(x0, yy, x1-x0, 2);
        }
        // chunky tufts along the rim — solid 3-5px leaf bunches instead of speck noise
        for(let i=0;i<16;i++){
          const u = (i+0.5)/16;
          const edgeV = 0.08 + hsh(seed+i*7.1)*0.7;
          const syy = Math.round(cyTop + edgeV*(cyBot-cyTop));
          const side = i%2? 1 : -1;
          const sxx = Math.round(mx + side*(cwHalf*prof(edgeV) - 2 + hsh(seed+i*9.7)*5));
          const tw2 = 3 + Math.floor(hsh(seed+i*5.9)*3);
          ctx.fillStyle = edgeV<0.35? LT : DP;
          ctx.fillRect(sxx-(tw2>>1), syy, tw2, 3);
          ctx.fillStyle = edgeV<0.35? MID : SH;
          ctx.fillRect(sxx-(tw2>>1)+1, syy+3, tw2-1, 2);
        }
        for(let i=0;i<6;i++){                              // a few tufts crowning the top line
          const cxm = Math.round(mx + (hsh(seed+i*43)*2-1)*cwHalf*0.7);
          ctx.fillStyle = HI; ctx.fillRect(cxm-3, cyTop-4, 7, 3);
          ctx.fillStyle = LT; ctx.fillRect(cxm-2, cyTop-1, 5, 2);
        }
        // ragged skirt tufts hanging under the crown — wide and flat, like drooping leaf layers
        for(let i=0;i<8;i++){
          const dx = Math.round(mx - cwHalf*0.8) + Math.floor(hsh(seed+i*13)*(cwHalf*1.6));
          ctx.fillStyle = i%2? SH2 : SH;
          ctx.fillRect(dx, cyBot-2, 8+Math.floor(hsh(seed+i+30)*7), 3+Math.floor(hsh(seed+i+60)*2));
        }
        // weeping strands draping off the canopy, longest at the outer edges
        for(let i=0;i<9;i++){
          const u = (i+0.5)/9;
          const sxr = Math.round(mx - cwHalf*0.9) + Math.floor(u*(cwHalf*1.8)) + Math.floor((hsh(seed+i*7)-0.5)*8);
          const edge = Math.abs(u-0.5)*2;
          let sy = cyBot - 6 + Math.floor(hsh(seed+i*29)*6);
          const len = Math.min(8 + Math.floor(hsh(seed+i*13)*(8 + edge*30)), 208-sy);
          for(let k=0;k<len;k+=3){
            const wob = Math.floor(hsh(seed+i*31+Math.floor(k/6)*17)*2);
            ctx.fillStyle = k>len-5? DP : (hsh(seed+i*5+k*11)<0.5? SH : SH2);
            ctx.fillRect(sxr+wob, sy+k, 2, 3);
          }
          if(hsh(seed+i*41)>0.45){                          // small leaf cluster at the tip
            ctx.fillStyle = SH;
            ctx.fillRect(sxr-1, sy+len, 4, 2);
          }
        }
        // the crown catches the lightning flash — light the clump tops so the
        // highlight follows the bumpy canopy outline instead of a straight bar
        if(lit){
          ctx.fillStyle = 'rgba(205,240,180,0.55)';   // bright leaf-green flash, not lavender — keeps lit crowns green
          for(let i=0;i<9;i++){                            // same positions as the top clumps
            const cwd = 18 + Math.floor(hsh(seed+i*19)*14);
            const cxm = Math.round(mx + (hsh(seed+i*23)*2-1)*cwHalf*0.82);
            const cyy = cyTop+((i*3)%5)-2;
            ctx.fillRect(cxm-(cwd>>1)+3, cyy-4, cwd-6, 2);
          }
          for(let i=0;i<6;i++){                            // crowning tufts catch it too
            const cxm = Math.round(mx + (hsh(seed+i*43)*2-1)*cwHalf*0.7);
            ctx.fillRect(cxm-3, cyTop-4, 7, 2);
          }
          ctx.fillRect(mx-Math.round(cwHalf*0.92), cyTop+7, 5, 2);
          ctx.fillRect(mx+Math.round(cwHalf*0.86), cyTop+6, 5, 2);
        }
        break;
      }
      // basalt shelter: roof slab on slim supports (pass-through)
      ctx.fillStyle = '#1c1016'; ctx.fillRect(x+4, 166, 4, GROUND_Y-166);
      ctx.fillStyle = '#1c1016'; ctx.fillRect(x+h.w-8, 166, 4, GROUND_Y-166);
      ctx.fillStyle = '#3a2430'; ctx.fillRect(x-6, 158, h.w+12, 10);
      ctx.fillStyle = '#5a3a4c'; ctx.fillRect(x-6, 158, h.w+12, 3);
      ctx.fillStyle = '#140a10'; ctx.fillRect(x+2, 164, h.w-4, 2);
      if(Math.sin(gtime*3+h.x)>0){ ctx.fillStyle = '#ff7a2e'; ctx.fillRect(x+6, 161, 2, 2); ctx.fillRect(x+h.w-10, 163, 2, 2); }
      break;
    }
    case 'teleport': {
      drawGlowDoor(x, h.y, '#ffd44e', L.t);
      const tx = Math.round(h.tx-camx);
      drawGlowDoor(tx, h.ty, '#8fe0ff', L.t+0.5);
      break;
    }
  }
}

function drawGlowDoor(x,y,color,t){
  // rooftop doorway, glowing from within
  const dw = 16, dh = 28, dx = x-dw/2, dy = y-dh/2;
  ctx.fillStyle = '#0c1226'; ctx.fillRect(dx-2, dy-3, dw+4, dh+3);   // frame
  const pulse = 0.55 + Math.sin(t*5)*0.2;
  ctx.fillStyle = color; ctx.globalAlpha = pulse; ctx.fillRect(dx, dy, dw, dh); ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(dx+dw/2-1, dy+3, 2, dh-6);
  ctx.fillStyle = color;
  ctx.fillRect(dx-4, dy+dh, dw+8, 2);                                 // light spilling on the roof
  for(let i=0;i<3;i++){
    const sy = dy+dh - ((t*22 + i*11) % (dh+8));
    ctx.fillRect(dx-3+((i*7)%(dw+6)), Math.round(sy), 1, 2);          // sparks
  }
}

function drawExit(camx){
  const def = L.def;
  if(!def.exit) return;
  const x = Math.round(def.exit.x-camx), y = def.exit.y;
  const th = THEME[def.theme] || THEME.moon;
  const t = gtime, ac = def.accent;
  // stone/metal archway in the world's own material
  ctx.fillStyle = th.gDot;
  ctx.fillRect(x-4, y-4, 5, 42); ctx.fillRect(x+21, y-4, 5, 42);
  ctx.fillRect(x-6, y-8, 34, 5);
  ctx.fillStyle = th.gTop;
  ctx.fillRect(x-4, y-4, 5, 2); ctx.fillRect(x+21, y-4, 5, 2); ctx.fillRect(x-6, y-8, 34, 2);
  // the shimmer within
  const pulse = 0.4 + Math.sin(t*3)*0.18;
  ctx.fillStyle = ac; ctx.globalAlpha = pulse; ctx.fillRect(x+1, y-2, 20, 40); ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(x+10, y+4, 2, 30);
  for(let i=0;i<4;i++){
    const sy = y+36 - ((t*24 + i*13) % 44);
    ctx.fillStyle = i%2? '#ffffff' : ac;
    ctx.fillRect(x+3+((i*7)%16), Math.round(sy), 1, 2);
  }
}

function drawEnemy(e, camx){
  const x = Math.round(e.x-camx);
  const y = Math.round(e.y + (e.type==='drone'? (e.yoff||0) : 0));
  const flash = (e.invuln||0)>0 && Math.floor(gtime*14)%2===0;
  if(e.dieT>=0){
    // squash
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(x, y+e.h-3, e.w, 3);
    return;
  }
  if(flash) return;
  switch(e.type){
    case 'drone': {
      const sk = enemySkin('drone');
      drawSprite(sk && sk.map ? SPR[sk.map] : SPR.drone, x, y, e.dir>0, 1, sk && sk.tint);
      break;
    }
    case 'crawler': {
      const sk = enemySkin('crawler');
      drawSprite(sk && sk.map ? SPR[sk.map] : SPR.crawler, x, y, e.dir>0, 1, sk && sk.tint);
      break;
    }
    case 'pirate':
      drawSprite(SPR.pirate, x, y, e.dir>0, 1);
      ctx.fillStyle = '#98a1b3';
      ctx.fillRect(e.dir>0? x+e.w : x-4, y+6, 4, 2);
      break;
    case 'leaper':  drawSprite(SPR.leaper, x, y, false, 1); break;
    case 'turret':
      ctx.fillStyle = '#39415a'; ctx.fillRect(x, y, e.w, e.h);
      ctx.fillStyle = '#98a1b3'; ctx.fillRect(x+2, y+2, e.w-4, 2);
      ctx.fillStyle = '#232a40'; ctx.fillRect(e.dir>0? x+e.w : x-5, y+3, 5, 4);
      ctx.fillStyle = Math.sin(gtime*6)>0? '#ff5a54':'#7a2c2c';
      ctx.fillRect(x+5, y+7, 3, 3);
      break;
    case 'miniboss':
      if(!e.active){ /* lurking silhouette */ ctx.fillStyle='rgba(170,178,192,0.55)'; ctx.fillRect(x,y,e.w,e.h); return; }
      drawSprite(SPR.pirate, x, y, (e.face||-1)>0, 2, {t:'s', d:'G'});
      break;
    case 'boss': {
      if(e.dying>0 && Math.floor(e.dying*10)%2===0) return;
      const seed = Math.floor(gtime*10);
      const cx3 = x + Math.round(e.w/2);
      const topY = y;                 // head sits at the very top
      const botY = y + e.h;           // feet at the ground line
      const sway = Math.sin(gtime*2 + e.x*0.05)*2;

      // --- long wiry legs splaying to the ground ---
      ctx.strokeStyle = '#0c0b08'; ctx.lineWidth = 2; ctx.lineJoin='round';
      const hipY = topY + Math.round(e.h*0.42);
      for(let leg=-1; leg<=1; leg+=(leg===0?1:2)){
        if(leg===0) continue;
        const footX = cx3 + leg*14 + Math.round(sway*leg);
        const kneeX = cx3 + leg*10;
        const kneeY = topY + Math.round(e.h*0.68) + Math.round(Math.sin(gtime*3+leg)*2);
        ctx.beginPath();
        ctx.moveTo(cx3 + leg*3, hipY);
        ctx.lineTo(kneeX, kneeY);
        ctx.lineTo(footX, botY);
        ctx.stroke();
        // splayed toes
        ctx.beginPath(); ctx.moveTo(footX, botY);
        ctx.lineTo(footX + leg*4, botY-1); ctx.moveTo(footX, botY);
        ctx.lineTo(footX - leg*2, botY-1); ctx.stroke();
      }
      // a third spindly middle leg
      ctx.beginPath();
      ctx.moveTo(cx3, hipY);
      ctx.lineTo(cx3 + Math.round(sway), botY-2);
      ctx.stroke();

      // --- thin trailing body / torso rising to the head ---
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(cx3, hipY);
      const midX = cx3 + Math.round(Math.sin(gtime*1.6)*3);
      ctx.lineTo(midX, topY + Math.round(e.h*0.24));
      ctx.lineTo(cx3 + Math.round(sway*0.5), topY+6);
      ctx.stroke();
      // dangling wiry filaments off the torso
      ctx.lineWidth = 1; ctx.strokeStyle = '#14120c';
      for(let i=0;i<4;i++){
        const fy = hipY - i*Math.round(e.h*0.12);
        const fx = cx3 + (hsh(i+seed)-0.5)*10;
        ctx.beginPath(); ctx.moveTo(cx3, fy);
        ctx.lineTo(fx, fy + 6 + hsh(i)*6); ctx.stroke();
      }

      // --- small dark head ---
      ctx.fillStyle = '#0c0b08';
      ctx.fillRect(cx3-6, topY+2, 12, 8);
      ctx.fillRect(cx3-4, topY, 8, 3);
      // faint eyes
      if(Math.sin(gtime*5)>-0.4){
        ctx.fillStyle = 'rgba(255,120,60,0.7)';
        ctx.fillRect(cx3-3, topY+4, 2, 2); ctx.fillRect(cx3+1, topY+4, 2, 2);
      }

      // --- the glowing core: its weakness, riding on the head ---
      const pul = Math.sin(gtime*8)*0.5+0.5;
      ctx.fillStyle = 'rgba(255,150,70,'+(0.18+pul*0.2).toFixed(3)+')';
      ctx.fillRect(cx3-7, topY-7, 14, 12);
      ctx.fillStyle = '#ff6a3c'; ctx.fillRect(cx3-4, topY-4, 8, 6);
      ctx.fillStyle = '#ffd44e'; ctx.fillRect(cx3-2, topY-3, 4, 4);
      if(pul>0.7){ ctx.fillStyle = '#fff8dc'; ctx.fillRect(cx3-1, topY-2, 2, 2); }
      ctx.lineWidth = 1;
      break;
    }
  }
}

function drawPlayerSprite(camx){
  const pl = player;
  const x = Math.round(pl.x-camx)-1, y = Math.round(pl.y)-2;
  if(deathT>=0){
    if(Math.floor(deathT*12)%2===0) drawSprite(SPR.player_jump, x, y, pl.face<0, 1);
    return;
  }
  let map = SPR.player_idle;
  const moving = Math.abs(pl.vx)>5;
  if(!pl.onGround) map = moving ? SPR.player_sideJump : SPR.player_jump;
  else if(moving) map = (Math.floor(pl.anim)%2===0)? SPR.player_sideA : SPR.player_sideB;
  drawSprite(map, x, y, pl.face<0, 1);
}

function drawFx(camx){
  for(const f of L.fx){
    const x = Math.round(f.x-camx), y = Math.round(f.y);
    if(f.kind==='stomp'){
      const r = f.t*40;
      ctx.strokeStyle = 'rgba(255,255,255,'+(1-f.t/f.life)+')';
      ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.stroke();
    } else if(f.kind==='flash'){
      ctx.fillStyle = 'rgba(180,255,200,'+(1-f.t/f.life)+')';
      ctx.fillRect(x-10, y-16, 20, 32);
    }
  }
}

function drawProjectiles(camx){
  for(const pr of L.projectiles){
    const x = Math.round(pr.x-camx), y = Math.round(pr.y);
    if(pr.kind==='laser'){
      ctx.fillStyle = '#ff5a54'; ctx.fillRect(x, y, pr.w, pr.h);
      ctx.fillStyle = '#ffd2c8'; ctx.fillRect(x+1, y, pr.w-2, 1);
    } else if(pr.kind==='orb'){
      // a thrown piece of the dark mass
      ctx.fillStyle = '#14130c'; ctx.fillRect(x, y-1, pr.w, pr.h+2);
      ctx.fillStyle = '#ff6a3c'; ctx.fillRect(x+1, y, 2, 1); ctx.fillRect(x+pr.w-3, y+pr.h-1, 2, 1);
    } else { // falling ceiling tile
      ctx.fillStyle = '#e9e3cb'; ctx.fillRect(x, y, pr.w, pr.h);
      ctx.fillStyle = '#c9b243'; ctx.fillRect(x, y+pr.h-2, pr.w, 2);
      ctx.fillStyle = '#fffce4'; ctx.fillRect(x+1, y+1, pr.w-2, 1);
    }
  }
}

function drawPlay(){
  const def = L.def, th = THEME[def.theme] || THEME.moon;
  let camx = L.cam;
  if(shake>0) camx += (Math.random()*2-1)*shake*0.7;

  drawSky(def.theme, camx);
  drawThemeBackdrop(def.theme, camx, L.t);

  for(const p of L.platforms) drawPlatform(p, th, camx);
  drawGroundDecor(def.theme, camx);
  if(def.breach){
    const bc = def.breach, bx = Math.round(bc.x - camx);
    if(bx > -80 && bx < VW+20){
      if(!L.breachBroken){
        ctx.fillStyle = '#8a93a4';
        ctx.fillRect(bx+8, GROUND_Y+2, 2, 10); ctx.fillRect(bx+10, GROUND_Y+10, 2, 8);
        ctx.fillRect(bx+30, GROUND_Y+3, 2, 14); ctx.fillRect(bx+44, GROUND_Y+2, 2, 8);
        ctx.fillRect(bx+22, GROUND_Y+6, 8, 2);
      } else {
        ctx.fillStyle = '#0c0a06'; ctx.fillRect(bx, GROUND_Y, bc.w, VH-GROUND_Y);
        const g = 0.35+Math.sin(gtime*3)*0.15;
        ctx.fillStyle = 'rgba(216,194,78,'+g.toFixed(3)+')';
        ctx.fillRect(bx+4, GROUND_Y+12, bc.w-8, VH-GROUND_Y-12);
        ctx.fillStyle = 'rgba(255,246,190,0.5)';
        ctx.fillRect(bx+bc.w/2-6, VH-10, 12, 10);
        ctx.fillStyle = '#c8ced8';
        ctx.fillRect(bx-4, GROUND_Y, 6, 5); ctx.fillRect(bx+bc.w-2, GROUND_Y, 6, 4);
        ctx.fillRect(bx-2, GROUND_Y+4, 3, 4); ctx.fillRect(bx+bc.w, GROUND_Y+3, 3, 5);
      }
    }
  }
  for(const h of L.hazards) drawHazard(h, camx);
  drawExit(camx);
  for(const e of L.enemies) drawEnemy(e, camx);
  drawPlayerSprite(camx);
  drawProjectiles(camx);
  drawFx(camx);

  /* autoscroll danger edge */
  if(def.mechanic==='autoscroll'){
    ctx.fillStyle = 'rgba(121,214,92,'+(0.25+Math.sin(gtime*6)*0.1)+')';
    ctx.fillRect(0,0,5,VH);
  }

  /* flare overlays */
  if(def.mechanic==='flares'){
    const ph = flarePhase();
    const swamp = def.theme==='swamp';
    if(ph==='warn'){
      const msg = swamp? '! LIGHTNING INCOMING !' : '! ERUPTION INCOMING !';
      const c = swamp? (Math.sin(gtime*16)>0?'#d8c6ff':'#9a7fe0') : (Math.sin(gtime*16)>0?'#ffd44e':'#ff9a3c');
      drawTextShadow(msg, VW/2, 30, 1, c, swamp?'#1a1030':'#3a1608', 'center');
    } else if(ph==='burst'){
      if(swamp){
        // brief white/purple screen flash — the strike itself is drawn in the backdrop
        ctx.fillStyle = 'rgba(220,210,255,0.22)'; ctx.fillRect(0,0,VW,VH);
      } else {
        ctx.fillStyle = 'rgba(255,190,80,0.30)'; ctx.fillRect(0,0,VW,VH);
        for(let i=0;i<8;i++){
          const rx = (i*67 + Math.floor(gtime*30)*13) % VW;
          ctx.fillStyle = 'rgba(255,230,150,0.5)'; ctx.fillRect(rx, 0, 2, VH);
        }
      }
    }
  }

  /* boss HP pips */
  if(bossRef && bossRef.alive && bossRef.dying<=0){
    drawText('ENTITY', 8, 22, 1, '#ffd9c2');
    for(let i=0;i<3;i++){
      ctx.fillStyle = i < bossRef.hp ? '#ff6a3c' : '#3a3020';
      ctx.fillRect(48+i*10, 21, 8, 6);
    }
  }
  if(def.breach && player.x > 1900){
    if(!L.breachBroken) drawTextShadow('DEFEAT THE GUARDIAN', VW/2, 30, 1, '#ffd44e', '#241410', 'center');
    else if(Math.sin(gtime*3)>-0.3) drawTextShadow('DROP THROUGH THE BREACH', VW/2, 30, 1, '#d8c24e', '#241410', 'center');
  }

  /* HUD */
  drawTextShadow('LEVEL '+(levelIndex+1), 8, 8, 1, '#eef2f7', '#12141f');
  if(state==='play'){
    const pb = {x:VW-24, y:5, w:18, h:15};
    const hov = hoverBtn(pb);
    // pixel drop shadow for readability, then the plain white bars
    ctx.fillStyle = '#12141f';
    ctx.fillRect(pb.x+6, pb.y+4, 4, 10); ctx.fillRect(pb.x+12, pb.y+4, 4, 10);
    ctx.fillStyle = hov ? '#8fe0ff' : '#ffffff';
    ctx.fillRect(pb.x+5, pb.y+3, 4, 10); ctx.fillRect(pb.x+11, pb.y+3, 4, 10);
    if(hov && mouseClick){ pauseSel = 0; setState('pause'); playSound('select'); }
  }
  if(L.t < 2.5 && state!=='pause'){
    const a = L.t>2.0 ? (2.5-L.t)*2 : 1;
    ctx.globalAlpha = a;
    drawTextShadow(def.name, VW/2, 46, 2, def.accent, '#12141f', 'center');
    ctx.globalAlpha = 1;
  }
  if(deathT>=0 && deathT>0.25){
    drawTextShadow('OOPS! TRY AGAIN', VW/2, 120, 2, '#ff8a6a', '#12141f', 'center');
  }
}

const DRIFTERS = []; // petals + fireflies for the menus
(function(){
  const rng = makeRng(42);
  for(let i=0;i<6;i++) DRIFTERS.push({kind:'petal', x:rng()*VW, y:rng()*230, vx:-(5+rng()*7), ph:rng()*6});
  for(let i=0;i<4;i++) DRIFTERS.push({kind:'fly', x:rng()*VW, y:70+rng()*160, vx:3+rng()*5, ph:rng()*6});
})();

function drawDrifters(dt){
  for(const d of DRIFTERS){
    d.x += d.vx*dt;
    if(d.vx<0 && d.x<-10){ d.x = VW+8; d.y = 10+Math.random()*230; }
    if(d.vx>0 && d.x>VW+10){ d.x = -8; d.y = 50+Math.random()*180; }
    const x = Math.round(d.x), y = Math.round(d.y + Math.sin(gtime*1.6+d.ph)*5);
    if(d.kind==='petal'){
      ctx.fillStyle = Math.sin(gtime*3+d.ph)>0 ? '#f2a0c8' : '#fdd9ea';
      ctx.fillRect(x, y, 2, 2); ctx.fillRect(x+2, y+1, 1, 1);
    } else {
      if(Math.sin(gtime*2.4+d.ph)>-0.2){
        ctx.fillStyle = 'rgba(255,233,138,0.3)'; ctx.fillRect(x-1, y-1, 4, 4);
        ctx.fillStyle = '#ffe98a'; ctx.fillRect(x, y, 2, 2);
      }
    }
  }
}

/* the meadow at dusk: home of the title, intro, level select, and the end */
const DUSK_KEYS = ['#1c2440','#3c3a6c','#7a5a94','#c88aa8','#e8b4c0'];
const DUSK_BANDS = (function(){
  const rgb = DUSK_KEYS.map(h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]);
  const cols = [], n = 28; // fine 9px steps: reads as a gradient, stays pixel-crisp
  for(let i=0;i<n;i++){
    const p = i/(n-1)*(rgb.length-1);
    const s = Math.min(Math.floor(p), rgb.length-2), t = p-s;
    const c = rgb[s].map((v,k)=>Math.round(v+(rgb[s+1][k]-v)*t));
    cols.push('rgb('+c[0]+','+c[1]+','+c[2]+')');
  }
  return cols;
})();
function drawMeadowDusk(px, withSun){
  const bh = 9;
  for(let i=0;i<DUSK_BANDS.length;i++){
    ctx.fillStyle = DUSK_BANDS[i];
    ctx.fillRect(0, i*bh, VW, Math.min(bh, 246-i*bh));
  }
  // stars fading in up top, and other worlds far away
  for(let i=0;i<42;i++){
    const sx = Math.floor(hsh(i)*VW), sy = Math.floor(hsh(i+60)*96);
    const tw = Math.sin(gtime*(1+hsh(i+120))+i)>0 ? 0.9 : 0.4;
    ctx.fillStyle = 'rgba(238,242,247,'+(tw*(1-sy/110)).toFixed(2)+')';
    ctx.fillRect(sx, sy, 1, 1);
  }
  drawPlanet(52, 26, 5, '#c14a3a', '#e8785a');
  drawPlanet(418, 40, 4, '#5a7fd0', '#8fb2f0');
  drawPlanet(258, 16, 3, '#6b3f92', '#b06ce8');
  if(withSun){
    const sx=240, sy=206, r=26;
    for(let yy=-r; yy<=r; yy++){
      const w2 = Math.floor(Math.sqrt(r*r - yy*yy));
      ctx.fillStyle = yy<-8? '#ffe9a8' : (yy<8? '#ffca6a':'#ff9a5c');
      ctx.fillRect(sx-w2, sy+yy, w2*2, 1);
    }
  }
  // mountain silhouettes
  ctx.fillStyle = '#2c2a54';
  for(let i=0;i<6;i++){
    const mx = ((i*150 + px) % 900 + 900) % 900 - 150;
    mkPeak(mx, 52+(i*13)%22, 54+(i*17)%18, 246);
  }
  ctx.fillStyle = '#201f42';
  for(let i=0;i<5;i++){
    const mx = ((i*200+80 + px*1.6) % 1000 + 1000) % 1000 - 150;
    mkPeak(mx, 64+(i*19)%24, 40+(i*11)%14, 246);
  }
  mkPines(px*2, 246, '#141330', 1000);
  // the meadow floor, sleeping
  ctx.fillStyle = '#2c4c34'; ctx.fillRect(0, 246, VW, 24);
  ctx.fillStyle = '#3c6444'; ctx.fillRect(0, 246, VW, 3);
  for(let i=0;i<VW;i+=22){
    const r = hsh((i+400)*0.37);
    if(r<0.4){
      ctx.fillStyle = '#24402c'; ctx.fillRect(i+2, 243, 1, 3); ctx.fillRect(i+4, 242, 1, 4);
      ctx.fillStyle = r<0.2? '#b06888':'#8a5878'; ctx.fillRect(i+2, 240, 3, 3);
    }
  }
}

function drawButton(label, y, selected){
  const w = label.length*6*1+24;
  const x = VW/2 - w/2;
  ctx.fillStyle = selected? '#1d2b4a' : '#141a2e';
  ctx.fillRect(x, y, w, 18);
  ctx.strokeStyle = selected? '#8fe0ff' : '#39415a';
  ctx.strokeRect(x+0.5, y+0.5, w-1, 17);
  drawText(label, VW/2, y+6, 1, selected? '#eef2f7':'#98a1b3', 'center');
  if(selected){
    const bl = Math.sin(gtime*6)>0;
    if(bl){ drawText('-', x-8, y+6, 1, '#8fe0ff'); drawText('-', x+w+4, y+6, 1, '#8fe0ff'); }
  }
  return {x:x, y:y, w:w, h:18};
}

function updateDrawTitle(dt){
  drawMeadowDusk(gtime*6, false);
  drawDrifters(dt);

  const bob = Math.sin(gtime*2)*3;
  drawTextShadow('ASTRONANYA', VW/2, 44+bob*0.4, 4, '#fdf1f6', '#3a1c34', 'center');
  drawTextShadow('WORLDS APART', VW/2, 78+bob*0.4, 1, '#ffd44e', '#3a2c10', 'center');

  // Ananya and Princess Shloka on the meadow, a heart between them
  drawSprite(SPR.player_idle, 210, 230, false, 1);
  drawSprite(SPR.princess, 260, 228, true, 1);
  const hb = Math.sin(gtime*3)*1.5;
  drawHeart(246, 214+hb, 2, Math.sin(gtime*3)>-0.3? '#ff5a7a':'#ff8aa0');

  const prog = loadProgress();
  const hasSave = prog>0 && prog<LEVELS.length;
  const done = prog>=LEVELS.length;
  let confirm = anyConfirm();
  if(hasSave || done){
    if(tap('ArrowDown')||tap('s')||tap('S')){ titleSel = (titleSel+1)%3; playSound('select'); }
    if(tap('ArrowUp')||tap('w')||tap('W')){ titleSel = (titleSel+2)%3; playSound('select'); }
    const b0 = drawButton('START', 109, titleSel===0);
    const b1 = drawButton(done? 'REPLAY' : 'CONTINUE', 133, titleSel===1);
    const b2 = drawButton('LEVELS', 157, titleSel===2);
    if(hoverBtn(b0)){ if(mouseMoved) titleSel = 0; if(mouseClick){ titleSel = 0; confirm = true; } }
    if(hoverBtn(b1)){ if(mouseMoved) titleSel = 1; if(mouseClick){ titleSel = 1; confirm = true; } }
    if(hoverBtn(b2)){ if(mouseMoved) titleSel = 2; if(mouseClick){ titleSel = 2; confirm = true; } }
  } else {
    titleSel = 0;
    const b0 = drawButton('START', 133, true);
    if(hoverBtn(b0) && mouseClick) confirm = true;
  }
  drawText('ARROWS/WASD MOVE   SPACE/W JUMP', VW/2, 200, 1, '#7a4460', 'center');
  drawText('R RETRY   P PAUSE   M MUTE'+(muted?' (OFF)':''), VW/2, 212, 1, '#7a4460', 'center');

  if(confirm){
    if(titleSel===2 && (hasSave||done)) openLevels('title');
    else if(titleSel===1 && (hasSave||done)) startGame(true);
    else startGame(false);
  }
}

  else                     drawVictoryEnd(dt);
}

/* --- frame 1: the reunion --- */
function drawVictoryReunion(dt){
  const T = stateT;
  drawBackroomsRoom(0, gtime, {recesses:[48, 402]});
  ctx.fillStyle = THEME.backrooms.gFill; ctx.fillRect(0,GROUND_Y,VW,VH-GROUND_Y);
  ctx.fillStyle = THEME.backrooms.gTop;  ctx.fillRect(0,GROUND_Y,VW,4);

  /* the entity comes apart */
  if(T < 2.2){
    const fade = 1 - T/2.2;
    const seed = Math.floor(gtime*10);
    for(let i=0;i<Math.floor(26*fade);i++){
      const rx = 252 + (hsh(i*3+seed)-0.5)*40*(1+T*1.4);
      const ry = GROUND_Y-14 - hsh(i*7+seed)*20 - T*20*hsh(i);
      const sq = Math.max(1, Math.floor((3+hsh(i*11)*5)*fade));
      ctx.fillStyle = i%3? '#14130c':'#1b1a12';
      ctx.fillRect(Math.round(rx), Math.round(ry), sq, sq);
    }
    if(Math.floor(gtime*12)%2===0 && fade>0.3){
      ctx.fillStyle='#ff6a3c'; ctx.fillRect(250, GROUND_Y-36+Math.floor(T*9), 6, 6);
      ctx.fillStyle='#ffd44e'; ctx.fillRect(252, GROUND_Y-34+Math.floor(T*9), 2, 2);
    }
  }

  /* and where it stood, she is standing (centered) */
  const sT = clamp((T-1.7)/0.9, 0, 1);
  if(sT>0){
    ctx.globalAlpha = sT;
    drawSprite(SPR.princess, 250, GROUND_Y-18, true, 1);
    ctx.globalAlpha = 1;
    for(let i=0;i<5;i++){
      if(Math.sin(gtime*4+i*2)>0.3){
        ctx.fillStyle = i%2? '#fff8dc':'#ffd44e';
        ctx.fillRect(242+((i*11)%30), GROUND_Y-32-((i*7)%22), 1, 2);
      }
    }
  }

  /* ananya runs to her — stops just left of the princess, pair centered on VW/2 */
  const ax = Math.min(224, 30 + T*100);
  const moving = ax < 224;
  const runMap = moving ? (Math.floor(gtime*8)%2? SPR.player_sideA:SPR.player_sideB) : SPR.player_idle;
  drawSprite(runMap, Math.round(ax), GROUND_Y-16, false, 1);

  if(T>2.8) drawTextShadow('PRINCESS SHLOKA IS FREE!', VW/2, 58, 2, '#ffd44e', '#3a2c10', 'center');
  if(T>3.3) drawText('"MY HERO! I KNEW YOU WOULD COME."', VW/2, 78, 1, '#fff8dc', 'center');
  if(T>3.8 && Math.sin(gtime*4)>0) drawText('PRESS ENTER', VW/2, VH-20, 1, '#fff8dc', 'center');
  if(T>1.2 && (anyConfirm()||mouseClick)){ victoryPage = 1; stateT = 0; playSound('select'); }
}

function drawVictoryVoyage(dt){
  /* THE WAY HOME — a portal door opens; hand in hand, they step through and noclip away */
  const T = stateT;
  drawBackroomsRoom(0, gtime, {recesses:[48, 402]});
  ctx.fillStyle = THEME.backrooms.gFill; ctx.fillRect(0,GROUND_Y,VW,VH-GROUND_Y);
  ctx.fillStyle = THEME.backrooms.gTop;  ctx.fillRect(0,GROUND_Y,VW,4);

  /* the portal door — same style as the level-exit portals: stone arch + shimmer core */
  const dx = 250, dy = GROUND_Y-38, ac = '#8fe0ff';
  const th = THEME.backrooms;
  ctx.fillStyle = th.gDot;
  ctx.fillRect(dx-4, dy-4, 5, 42); ctx.fillRect(dx+21, dy-4, 5, 42);
  ctx.fillRect(dx-6, dy-8, 34, 5);
  ctx.fillStyle = th.gTop;
  ctx.fillRect(dx-4, dy-4, 5, 2); ctx.fillRect(dx+21, dy-4, 5, 2); ctx.fillRect(dx-6, dy-8, 34, 2);
  const pulse = 0.45 + Math.sin(gtime*3)*0.2;
  ctx.fillStyle = ac; ctx.globalAlpha = pulse; ctx.fillRect(dx+1, dy-2, 20, 40); ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffffff'; ctx.fillRect(dx+10, dy+4, 2, 30);
  for(let i=0;i<5;i++){
    const sy = dy+36 - ((gtime*24 + i*13) % 44);
    ctx.fillStyle = i%2? '#ffffff' : ac;
    ctx.fillRect(dx+3+((i*7)%16), Math.round(sy), 1, 2);
  }

  /* the two of them walk to the portal, then noclip through (fade into it) */
  const arrive = 3.4;                              // time to reach the door
  const walk = Math.min(1, T/arrive);
  const baseX = 150 + walk*90;                      // ends at the door mouth (~240)
  const step = Math.floor(gtime*6)%2;
  const through = clamp((T-arrive)/1.1, 0, 1);      // noclip fade as they pass through

  if(through < 1){
    // shrink + fade as they cross the threshold (the "noclip" dissolve)
    ctx.globalAlpha = 1 - through*0.9;
    const bob = through>0? Math.round(through*4) : 0;
    drawSprite(SPR.player_back, Math.round(baseX), GROUND_Y-16-(step?1:0)+bob, false, 1);
    drawSprite(SPR.princess_back, Math.round(baseX)+18, GROUND_Y-18-(step?0:1)+bob, false, 1);
    ctx.globalAlpha = 1;
    // scatter of noclip pixels peeling off them into the portal
    if(through>0){
      for(let i=0;i<12;i++){
        if(hsh(i+Math.floor(gtime*12))>through) continue;
        ctx.fillStyle = i%2? ac : '#ffffff';
        ctx.fillRect(Math.round(baseX)+ (hsh(i)*20|0), GROUND_Y-20+ (hsh(i+9)*18|0), 1, 2);
      }
    }
  } else {
    // gone — a last shimmer at the door
    ctx.fillStyle = 'rgba(143,224,255,0.5)'; ctx.fillRect(dx+2, dy, 18, 38);
  }

  if(T>0.4) drawText('HAND IN HAND, THEY RETURN HOME.', VW/2, 78, 1, '#fff8dc', 'center');
  if(T>arrive+0.4 && Math.sin(gtime*4)>0) drawText('PRESS ENTER', VW/2, VH-20, 1, '#fff8dc', 'center');
  if(T>arrive+0.2 && (anyConfirm()||mouseClick)){ victoryPage = 2; stateT = 0; playSound('portal'); }
}

function drawVictoryEnd(dt){
  const T = stateT;
  drawMeadowDusk(0, true);
  /* fireflies rising over the meadow */
  for(let i=0;i<9;i++){
    if(Math.sin(gtime*2+i*1.7)>-0.1){
      const fx2 = 30 + ((i*53 + Math.floor(hsh(i)*40)) % (VW-60));
      const fy2 = 160 + hsh(i+30)*80 - (gtime*4 + i*9) % 30;
      ctx.fillStyle = 'rgba(255,233,138,0.3)'; ctx.fillRect(Math.round(fx2)-1, Math.round(fy2)-1, 4, 4);
      ctx.fillStyle = '#ffe98a'; ctx.fillRect(Math.round(fx2), Math.round(fy2), 2, 2);
    }
  }
  /* the two of them, watching the sun go down (centered) */
  drawSprite(SPR.player_back, 228, 230, false, 1);
  drawSprite(SPR.princess_back, 248, 228, false, 1);
  /* a small heart above and between them */
  const hb = Math.sin(gtime*3)*1.5;
  drawHeart(241, 214+hb, 2, Math.sin(gtime*3)>-0.3? '#ff5a7a':'#ff8aa0');

  ctx.globalAlpha = Math.min(1, T/1.2);
  drawTextShadow('THE END', VW/2, 84, 3, '#ffd44e', '#3a2c10', 'center');
  ctx.globalAlpha = 1;
  if(T>1.6) drawText('THANK YOU FOR PLAYING', VW/2, 120, 1, '#e8b4c0', 'center');
  if(T>2.2 && Math.sin(gtime*4)>0) drawText('PRESS ENTER', VW/2, VH-20, 1, '#e8b4c0', 'center');
  if(T>1.2 && (anyConfirm()||mouseClick)){ playSound('select'); setState('title'); playMusic('title'); }
}

/* ---------- level select ---------- */
function openLevels(from){
  levelsFrom = from;
  const unlocked = Math.min(loadProgress()+1, LEVELS.length);
  levelSel = from==='pause' ? levelIndex : unlocked-1;
  setState('levels');
  playSound('select');
}

function updateDrawLevels(dt){
  drawMeadowDusk(gtime*6, false);
  ctx.fillStyle = 'rgba(8,7,16,0.45)'; ctx.fillRect(0,0,VW,VH);
  drawDrifters(dt);
  drawTextShadow('SELECT LEVEL', VW/2, 26, 2, '#8fe0ff', '#1d3a5f', 'center');

  const prog = loadProgress();
  const unlocked = Math.min(prog+1, LEVELS.length);
  const cols = 5, bw = 64, bh = 44, gapx = 16, gapy = 14;
  const x0 = Math.floor((VW - (cols*bw + (cols-1)*gapx))/2), y0 = 60;

  if(tap('ArrowRight')||tap('d')||tap('D')){ levelSel = (levelSel+1)%LEVELS.length; playSound('select'); }
  if(tap('ArrowLeft')||tap('a')||tap('A')){ levelSel = (levelSel+LEVELS.length-1)%LEVELS.length; playSound('select'); }
  if(tap('ArrowDown')||tap('s')||tap('S')){ levelSel = (levelSel+cols)%LEVELS.length; playSound('select'); }
  if(tap('ArrowUp')||tap('w')||tap('W')){ levelSel = (levelSel+LEVELS.length-cols)%LEVELS.length; playSound('select'); }

  let confirm = anyConfirm();
  for(let i=0;i<LEVELS.length;i++){
    const cx = x0 + (i%cols)*(bw+gapx), cy = y0 + Math.floor(i/cols)*(bh+gapy);
    const open = i < unlocked, sel = i===levelSel;
    ctx.fillStyle = open ? (sel? '#1d2b4a' : '#141a2e') : '#0d1120';
    ctx.fillRect(cx, cy, bw, bh);
    ctx.strokeStyle = sel? '#8fe0ff' : (open? '#39415a' : '#232a40');
    ctx.strokeRect(cx+0.5, cy+0.5, bw-1, bh-1);
    if(open){
      const beaten = i < prog;
      drawText(String(i+1), cx+bw/2, cy+11, 2, beaten? '#79d65c' : '#ffd44e', 'center');
      if(beaten) drawText('CLEAR', cx+bw/2, cy+30, 1, '#3f7a32', 'center');
      const rr = {x:cx, y:cy, w:bw, h:bh};
      if(hoverBtn(rr)){ if(mouseMoved) levelSel = i; if(mouseClick){ levelSel = i; confirm = true; } }
    } else {
      // little padlock
      const lx = cx+bw/2-5, ly = cy+bh/2-7;
      ctx.fillStyle = '#39415a';
      ctx.fillRect(lx+2, ly, 6, 2); ctx.fillRect(lx+2, ly, 2, 6); ctx.fillRect(lx+6, ly, 2, 6);
      ctx.fillRect(lx, ly+5, 10, 8);
      ctx.fillStyle = '#232a40'; ctx.fillRect(lx+4, ly+8, 2, 3);
    }
  }

  const selOpen = levelSel < unlocked;
  const def = LEVELS[levelSel];
  if(selOpen){
    drawTextShadow(def.name, VW/2, 188, 2, def.accent, '#12141f', 'center');
    drawText(def.subtitle, VW/2, 206, 1, '#98a1b3', 'center');
  } else {
    drawText('LOCKED - CLEAR EARLIER LEVELS FIRST', VW/2, 194, 1, '#5a6377', 'center');
  }
  if(Math.sin(gtime*4)>0) drawText('ENTER PLAY   ESC BACK', VW/2, 226, 1, '#8fe0ff', 'center');

  if(confirm && selOpen){
    loadLevel(levelSel); setState('card'); playSound('portal');
    return;
  }
  if(tap('Escape')||tap('q')||tap('Q')||tap('Backspace')){
    setState(levelsFrom==='pause' ? 'pause' : 'title');
    playSound('select');
  }
}

/* ---------- pause / settings menu ---------- */
const PAUSE_ITEMS = [
  {label:'RESUME',        key:'ESC'},
  {label:'SOUND FX',      key:'F'},
  {label:'VOLUME',        key:'< >'},
  {label:'RESTART LEVEL', key:'R'},
  {label:'LEVEL SELECT',  key:'L'},
  {label:'QUIT TO TITLE', key:'Q'}
];

function activatePause(i){
  switch(i){
    case 0: setState('play'); playSound('select'); break;
    case 1: sfxOn = !sfxOn; saveSettings(); if(sfxOn) playSound('select'); break;
    case 2: masterVol = clampVol(masterVol>=1? 0.1 : masterVol+0.1); applyVolume(); saveSettings(); playSound('select'); break;
    case 3: loadLevel(levelIndex); setState('play'); playSound('select'); break;
    case 4: openLevels('pause'); break;
    case 5: setState('title'); playMusic('title'); playSound('select'); break;
  }
}

function updateDrawPause(dt){
  drawPlay(); // frozen world behind the menu
  ctx.fillStyle = 'rgba(4,6,14,0.72)'; ctx.fillRect(0,0,VW,VH);
  drawTextShadow('PAUSED', VW/2, 48, 3, '#8fe0ff', '#1d3a5f', 'center');

  if(tap('ArrowDown')||tap('s')||tap('S')){ pauseSel = (pauseSel+1)%PAUSE_ITEMS.length; playSound('select'); }
  if(tap('ArrowUp')||tap('w')||tap('W')){ pauseSel = (pauseSel+PAUSE_ITEMS.length-1)%PAUSE_ITEMS.length; playSound('select'); }
  const left  = tap('ArrowLeft')||tap('a')||tap('A');
  const right = tap('ArrowRight')||tap('d')||tap('D');
  const enter = anyConfirm();

  const px = VW/2-114, pw = 228, py = 84, rowH = 16;
  const bx = px+pw-96; // volume bar x
  ctx.fillStyle = '#10152a'; ctx.fillRect(px, py-8, pw, PAUSE_ITEMS.length*rowH+16);
  ctx.strokeStyle = '#39415a'; ctx.strokeRect(px+0.5, py-7.5, pw-1, PAUSE_ITEMS.length*rowH+15);

  let clickedRow = -1;
  for(let i=0;i<PAUSE_ITEMS.length;i++){
    const y = py + i*rowH;
    const sel = i===pauseSel;
    if(sel){ ctx.fillStyle = '#1d2b4a'; ctx.fillRect(px+4, y-4, pw-8, rowH-2); }
    const it = PAUSE_ITEMS[i];
    drawText(it.label, px+12, y, 1, sel? '#eef2f7':'#98a1b3');
    drawText(it.key, px+pw-12, y, 1, sel? '#8fe0ff':'#5a6377', 'right');
    if(i===1){
      drawText(sfxOn? 'ON':'OFF', px+pw-46, y, 1, sfxOn? '#79d65c':'#ff8a6a', 'right');
    }
    if(i===2){
      for(let b=0;b<10;b++){
        ctx.fillStyle = b < Math.round(masterVol*10) ? '#8fe0ff' : '#2a3350';
        ctx.fillRect(bx+b*5, y, 4, 5);
      }
    }
    if(sel && Math.sin(gtime*6)>0) drawText('-', px+4, y, 1, '#8fe0ff');

    const rr = {x:px+4, y:y-4, w:pw-8, h:rowH-2};
    if(hoverBtn(rr)){
      if(mouseMoved) pauseSel = i;
      if(mouseClick){
        pauseSel = i;
        if(i===2 && mouseX >= bx-2 && mouseX <= bx+52){
          masterVol = clampVol(Math.max(0, Math.min(10, Math.ceil((mouseX-bx)/5)))/10);
          applyVolume(); saveSettings(); playSound('select');
        } else clickedRow = i;
      }
    }
  }
  drawText('CLICK, OR PRESS THE KEY SHOWN', VW/2, py+PAUSE_ITEMS.length*rowH+14, 1, '#5a6377', 'center');

  if(pauseSel===2 && (left||right)){
    masterVol = clampVol(masterVol + (right?0.1:-0.1));
    applyVolume(); saveSettings(); playSound('select');
  }
  if(enter) activatePause(pauseSel);
  if(clickedRow>=0) activatePause(clickedRow);
  if(tap('f')||tap('F')) activatePause(1);
  if(tap('r')||tap('R')) activatePause(3);
  if(tap('l')||tap('L')) activatePause(4);
  if(tap('q')||tap('Q')) activatePause(5);
  if(tap('p')||tap('P')||tap('Escape')){ setState('play'); playSound('select'); }
}

/* ============================================================
   MAIN LOOP — fixed timestep
   ============================================================ */
let last = performance.now(), acc = 0;
const STEP = 1/60;

function frame(now){
  requestAnimationFrame(frame);
  let dtReal = (now-last)/1000; last = now;
  if(dtReal > 0.1) dtReal = 0.1;
  acc += dtReal;
  while(acc >= STEP){
    tick(STEP);
    acc -= STEP;
  }
  wantPointer = false;
  render();
  if(cv.style) cv.style.cursor = wantPointer ? 'pointer' : 'default';
  // clear edge-presses once per frame, after both logic and menu draws have read them
  for(const k in pressed) pressed[k] = false;
  mouseClick = false;
  mouseMoved = false;
}

let needRender = null;
function tick(dt){
  gtime += dt;
  stateT += dt;
  if(tap('m')||tap('M')) setMuted(!muted);
  if(state==='play') updatePlay(dt);
  needRender = dt; // stash dt for screens that animate in draw
}

function render(){
  ctx.clearRect(0,0,VW,VH);
  const dt = STEP;
  switch(state){
    case 'title':   updateDrawTitle(dt); break;
    case 'intro':   updateDrawIntro(dt); break;
    case 'card':    updateDrawCard(dt); break;
    case 'levels':  updateDrawLevels(dt); break;
    case 'play':    drawPlay(); break;
    case 'noclip':  updateDrawNoclip(dt); break;
    case 'pause':   updateDrawPause(dt); break;
    case 'clear':   updateDrawClear(dt); break;
    case 'victory': updateDrawVictory(dt); break;
  }
}

window.addEventListener('blur', ()=>{ if(state==='play'){ pauseSel = 0; setState('pause'); } });

playMusic('title');
requestAnimationFrame(frame);
</script>
