'use strict';

   WORLDS APART
   A single-file pixel-art platformer across ten worlds.
   ============================================================ */

/* ============================================================
   AUDIO — tiny chiptune engine (Web Audio API, zero assets)
   ============================================================ */
let AC=null, masterG=null, sfxG=null, noiseBuf=null, muted=false;
let masterVol=0.5, sfxOn=true;

const SETTINGS_KEY = 'worldsapart_settings';
function loadSettings(){
  try{
    const o = JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');
    if(typeof o.vol==='number') masterVol = clampVol(o.vol);
    if(typeof o.sfx==='boolean') sfxOn = o.sfx;
  }catch(e){}
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify({vol:masterVol, sfx:sfxOn})); }catch(e){}
}
function clampVol(v){ return Math.max(0, Math.min(1, Math.round(v*10)/10)); }
function applyVolume(){ if(masterG) masterG.gain.value = muted?0:masterVol; }

function ensureAudio(){
  if(AC){ if(AC.state==='suspended') AC.resume(); return; }
  try{
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if(!Ctor) return;
    AC = new Ctor();
    masterG = AC.createGain(); masterG.gain.value = muted?0:masterVol; masterG.connect(AC.destination);
    sfxG = AC.createGain(); sfxG.gain.value = 1.3;  sfxG.connect(masterG);
    noiseBuf = AC.createBuffer(1, Math.floor(AC.sampleRate*0.4), AC.sampleRate);
    const d = noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  }catch(e){ AC = null; }
}
function setMuted(m){ muted = m; applyVolume(); }

function envG(g,t,vol,dur){
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(Math.max(0.0002,vol), t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
}
function tone(dest,wave,f0,f1,t,dur,vol){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = wave; o.frequency.setValueAtTime(f0,t);
  if(f1 && f1!==f0) o.frequency.exponentialRampToValueAtTime(Math.max(24,f1), t+dur);
  envG(g,t,vol,dur);
  o.connect(g); g.connect(dest);
  o.start(t); o.stop(t+dur+0.03);
}
function noiseHit(dest,t,dur,vol,hp){
  const s = AC.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const g = AC.createGain(); envG(g,t,vol,dur);
  let node = s;
  if(hp){ const f = AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp; s.connect(f); node = f; }
  node.connect(g); g.connect(dest);
  s.start(t); s.stop(t+dur+0.03);
}

/* ---- sound effects ---- */
function playSound(id){
  if(!AC || muted || !sfxOn) return;
  const t = AC.currentTime;
  switch(id){
    case 'jump':   tone(sfxG,'square',280,620,t,0.10,0.13); break;
    case 'stomp':  tone(sfxG,'square',260,70,t,0.12,0.17); noiseHit(sfxG,t,0.08,0.09,1200); break;
    case 'death':  tone(sfxG,'sawtooth',420,55,t,0.45,0.15); noiseHit(sfxG,t,0.25,0.09); break;
    case 'clear':  [523,659,784,1047].forEach((f,i)=>tone(sfxG,'square',f,f,t+i*0.09,0.12,0.11)); break;
    case 'select': tone(sfxG,'square',740,880,t,0.06,0.09); break;
    case 'portal': tone(sfxG,'triangle',180,950,t,0.22,0.13); break;
    case 'shoot':  tone(sfxG,'square',950,320,t,0.07,0.05); break;
    case 'hit':    tone(sfxG,'square',160,60,t,0.16,0.15); noiseHit(sfxG,t,0.12,0.09,800); break;
    case 'crumble':tone(sfxG,'square',180,60,t,0.16,0.10); noiseHit(sfxG,t,0.16,0.11,900); break;
  }
}

/* ---- music: removed by request; hook retained for the future ---- */
function playMusic(id){ }

/* ---------- canvas / scaling ---------- */
const VW = 480, VH = 270;
const cv = document.getElementById('game');
cv.width = VW; cv.height = VH;
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

function fit(){
  const dpr = window.devicePixelRatio || 1;
  const sc = Math.min(window.innerWidth/VW, window.innerHeight/VH);
  // snap to an integer number of *device* pixels per game pixel so
  // strokes render uniformly (no alternating 3px/4px columns);
  // allow fractional fill only if the window is smaller than 1x
  const use = sc < 1 ? sc : Math.max(1, Math.floor(sc*dpr)) / dpr;
  cv.style.width  = (VW*use) + 'px';
  cv.style.height = (VH*use) + 'px';
}
window.addEventListener('resize', fit); fit();

/* ---------- persistence ---------- */
const SAVE_KEY = 'worldsapart_progress';
let memProgress = 0;
function loadProgress(){
  try{ const v = parseInt(localStorage.getItem(SAVE_KEY)||'0',10); return isNaN(v)?0:v; }
  catch(e){ return memProgress; }
}
function saveProgress(v){
  memProgress = Math.max(memProgress, v);
  try{ const cur = loadProgress(); if(v>cur) localStorage.setItem(SAVE_KEY, String(v)); }
  catch(e){ /* in-memory fallback already set */ }
}

/* ---------- input ---------- */
const keys = {}, pressed = {};
window.addEventListener('keydown', e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','Enter'].includes(e.key)) e.preventDefault();
  ensureAudio();
  if(!keys[e.key]) pressed[e.key] = true;
  keys[e.key] = true;
});
window.addEventListener('keyup', e=>{ keys[e.key] = false; });
function tap(k){ if(pressed[k]){ pressed[k]=false; return true; } return false; }
function anyConfirm(){ return tap('Enter') || tap(' '); }

/* mouse / touch (canvas-space coordinates) */
let mouseX = -100, mouseY = -100, mouseClick = false, mouseMoved = false;
let wantPointer = false;
function mouseIn(r){ return mouseX >= r.x && mouseX <= r.x+r.w && mouseY >= r.y && mouseY <= r.y+r.h; }
function hoverBtn(r){ if(mouseIn(r)){ wantPointer = true; return true; } return false; }
if(cv.addEventListener){
  const toXY = (cx, cy) => {
    const r = cv.getBoundingClientRect();
    if(r.width>0){ mouseX = (cx - r.left) * VW / r.width; mouseY = (cy - r.top) * VH / r.height; }
  };
  cv.addEventListener('mousemove', e => { toXY(e.clientX, e.clientY); mouseMoved = true; });
  cv.addEventListener('mousedown', e => { ensureAudio(); toXY(e.clientX, e.clientY); mouseClick = true; });
  cv.addEventListener('touchstart', e => {
    ensureAudio();
    const t = e.touches[0]; if(t) { toXY(t.clientX, t.clientY); mouseClick = true; }
    e.preventDefault();
  }, {passive:false});
}

function drawText(s, x, y, scale, color, align){
  s = String(s).toUpperCase();
  const w = s.length*(6*scale)-scale;
  if(align==='center') x -= Math.floor(w/2);
  if(align==='right')  x -= w;
  ctx.fillStyle = color;
  for(let i=0;i<s.length;i++){
    const g = FONT[s[i]] || FONT['?'];
    for(let r=0;r<5;r++){
      const row = g[r];
      for(let c=0;c<5;c++){
        if(row & (16>>c)) ctx.fillRect(x+i*6*scale+c*scale, y+r*scale, scale, scale);
      }
    }
  }
  return w;
}
function drawTextShadow(s,x,y,scale,color,shadow,align){
  drawText(s,x,y+scale,scale,shadow,align);   // straight-down shadow keeps the block optically centered
  drawText(s,x,y,scale,color,align);
}

function drawSprite(map, x, y, flip, scale, tint){
  scale = scale||1;
  x = Math.round(x); y = Math.round(y);
  const w = map[0].length;
  for(let r=0;r<map.length;r++){
    const row = map[r];
    for(let c=0;c<w;c++){
      let ch = flip ? row[w-1-c] : row[c];
      if(ch==='.') continue;
      if(tint && tint[ch]) ch = tint[ch];
      const col = PAL[ch]; if(!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(x+c*scale, y+r*scale, scale, scale);
    }
  }
}

const GROUND_Y = 224;

/* builder helpers (still produce plain data) */
function ground(x,w){ return {x:x, y:GROUND_Y, w:w, h:VH-GROUND_Y+8, type:'solid', ground:true}; }
function plat(x,y,w){ return {x:x, y:y, w:w, h:10, type:'solid', oneway:true}; }
function crumb(x,y,w){ return {x:x, y:y, w:w, h:10, type:'crumble', oneway:true}; }
function mover(x,y,w,axis,range,speed,phase){ return {x:x, y:y, w:w, h:10, type:'moving', oneway:true, axis:axis, range:range, speed:speed||1, phase:phase||0}; }
function block(x,y,w,h){ return {x:x,y:y,w:w,h:h,type:'solid'}; }

function drone(x,y,x0,x1,sp){ return {type:'drone', x:x, y:y, x0:x0, x1:x1, speed:sp||26}; }
function crawler(x,y,sp){ return {type:'crawler', x:x, y:(y||GROUND_Y)-8, speed:sp||21}; }
function pirate(x,y,dir,period,phase,py){ return {type:'pirate', x:x, y:y-14, dir:dir, period:period||2.2, phase:phase||0, py:py}; }
function leaper(x,y){ return {type:'leaper', x:x, y:(y||GROUND_Y)-10}; }
function turret(x,y,dir,period,phase){ return {type:'turret', x:x, y:y, dir:dir, period:period||1.9, phase:phase||0}; }
function miniboss(x,trigger){ return {type:'miniboss', x:x, y:GROUND_Y-28, trigger:trigger}; }

function spike(x,w){ return {type:'spike', x:x, y:GROUND_Y-8, w:w, h:8}; }
function fire(x,w){ return {type:'fire', x:x, y:GROUND_Y-12, w:w, h:12}; }
function sparkwire(x){ return {type:'wire', x:x, y:GROUND_Y-38, w:5, h:38}; }
function crystals(x,w){ return {type:'crystals', x:x, y:GROUND_Y-18, w:w, h:18}; }
function mine(x,y){ return {type:'mine', x:x, y:y, w:10, h:10}; }
function laser(x,period,phase,top,bottom){ return {type:'laser', x:x, y:(top===undefined?96:top), w:4, h:(bottom===undefined?GROUND_Y:bottom)-(top===undefined?96:top), period:period||1.6, phase:phase||0, duty:0.42}; }
function cover(x,w){ return {type:'cover', x:x, w:w}; }
function teleport(x,y,tx,ty){ return {type:'teleport', x:x, y:y, tx:tx, ty:ty}; }

/* ---------- level loading ---------- */
function loadLevel(i){
  const def = LEVELS[i];
  levelIndex = i;
  L = {
    def: def, t: 0, cam: 0,
    platforms: def.platforms.map(p => Object.assign({}, p, {crumbT:-1, fallV:0, oy:p.y, ox:p.x, dead:false, px:p.x, py:p.y})),
    enemies: def.enemies.map(e => makeEnemy(e)),
    hazards: def.hazards.map(h => Object.assign({}, h)),
    projectiles: [], fx: [],
    exitOpen: !def.exitLocked,
    breachBroken: !!def.breach && !def.enemies.some(e => e.type==='miniboss'),
    scrollX: 0, tpCooldown: 0
  };
  player = {
    x: def.spawn.x, y: def.spawn.y, w: 10, h: 14,
    vx: 0, vy: 0, face: 1, onGround: false, coyote: 0, jbuf: 0,
    prevBottom: def.spawn.y + 14, anim: 0, dead: false, standOn: null
  };
  bossRef = null;
  if(def.mechanic === 'boss'){
    bossRef = { type:'boss', x: 360, y: GROUND_Y-56, w: 22, h: 54, vx: 0, vy: 0,
      hp: 3, phase: 1, hopT: 1.9, fireT: 2.6, debrisT: 3.0, invuln: 0, dying: 0,
      alive: true, face: -1, onGround: true };
    L.enemies.push(bossRef);
  }
  deathT = -1;
  playMusic(def.mechanic==='boss' ? 'boss' : 'level');
}

function makeEnemy(e){
  const o = Object.assign({}, e);
  o.alive = true; o.dieT = -1; o.t = Math.random()*0.01;
  switch(e.type){
    case 'drone':   o.w=12; o.h=7;  o.dir=1; break;
    case 'crawler': o.w=12; o.h=7;  o.dir=-1; o.vy=0; break;
    case 'pirate':  o.w=12; o.h=14; o.fireT=e.phase||0; break;
    case 'leaper':  o.w=10; o.h=8;  o.vx=0; o.vy=0; o.jumpT=1.0; o.onGround=false; break;
    case 'turret':  o.w=14; o.h=12; o.fireT=e.phase||0; o.solidHazard=true; break;
    case 'miniboss':o.w=22; o.h=26; o.hp=3; o.invuln=0; o.hopT=1.2; o.fireT=1.6;
                    o.vx=0; o.vy=0; o.active=false; o.onGround=false; break;
  }
  return o;
}

function startGame(fromContinue){
  const prog = loadProgress();
  if(fromContinue && prog>0){
    setState('card'); loadLevel(Math.min(prog, LEVELS.length-1));
  } else {
    setState('intro'); introPage = 0;
  }
  playSound('select');
}

function setState(s){ state = s; stateT = 0; if(s==='victory') victoryPage = 0; }

function onGuardianDown(){
  if(!L.def.breach) return;
  L.breachBroken = true;
  for(const p of L.platforms){ if(p.breach) p.dead = true; }
  shake = 7; playSound('hit');
  addFx('flash', L.def.breach.x + L.def.breach.w/2, GROUND_Y);
}

function updateDrawNoclip(dt){
  const T = stateT, D = 2.3;
  ctx.fillStyle = '#08070a'; ctx.fillRect(0,0,VW,VH);
  // speed lines rushing up through the void
  for(let i=0;i<26;i++){
    const x = Math.floor(hsh(i)*VW);
    const yy = ((i*37 - T*(340+hsh(i+9)*160)) % (VH+40) + (VH+40)) % (VH+40) - 20;
    ctx.fillStyle = 'rgba(150,150,170,'+(0.05+hsh(i+5)*0.14).toFixed(2)+')';
    ctx.fillRect(x, Math.round(yy), 1, 8+hsh(i+3)*20);
  }
  // backrooms glow bleeding up from below through scanlines
  const g = Math.min(1, T/D);
  for(let y=VH; y>VH-g*VH*0.9; y-=3){
    const a = (1-(VH-y)/(g*VH*0.9))*0.5*g;
    ctx.fillStyle = 'rgba(216,194,78,'+a.toFixed(3)+')';
    ctx.fillRect(0, y, VW, 2);
  }
  // horizontal reality tears — seeded per time-slice so they stutter
  const seed = Math.floor(T*9);
  for(let i=0;i<5;i++){
    if(hsh(seed*7+i)<0.45) continue;
    const ty = Math.floor(hsh(seed*3+i*11)*VH);
    const th = 2 + Math.floor(hsh(seed+i*5)*5);
    const off = Math.round((hsh(seed*5+i)-0.5)*26);
    try{
      const img = ctx.getImageData(0, ty, VW, th);
      ctx.putImageData(img, off, ty);
    }catch(e){}
    ctx.fillStyle = 'rgba(140,220,255,0.08)'; ctx.fillRect(0, ty, VW, 1);
  }
  // afterimages peeling upward off the player
  const wob = Math.sin(T*8)*6, py = 110 + Math.sin(T*3)*8;
  ctx.globalAlpha = 0.10; drawSprite(SPR.player_jump, VW/2-6+wob*1.6, py-26, wob<0, 1);
  ctx.globalAlpha = 0.22; drawSprite(SPR.player_jump, VW/2-6+wob*1.3, py-13, wob<0, 1);
  ctx.globalAlpha = 1;    drawSprite(SPR.player_jump, VW/2-6+wob,     py,    wob<0, 1);
  // pixels flaking off her, streaming up
  for(let i=0;i<10;i++){
    const fy = py+14 - ((T*90 + i*23) % 70);
    ctx.fillStyle = i%2? 'rgba(238,242,247,0.5)' : 'rgba(216,194,78,0.5)';
    ctx.fillRect(Math.round(VW/2-5+hsh(i)*10+wob), Math.round(fy), 1, 1);
  }
  if(T > 0.4 && T < 1.9 && Math.floor(T*10)%3!==0)
    drawTextShadow('F A L L I N G . . .', VW/2, 34, 1, '#d8c24e', '#241f08', 'center');
  if(T >= D){ loadLevel(9); setState('card'); }
}

function killPlayer(){
  if(deathT>=0 || player.dead) return;
  player.dead = true; deathT = 0; shake = 5;
  playSound('death');
}

function levelClear(){
  playSound('clear');
  saveProgress(levelIndex+1);
  if(levelIndex >= LEVELS.length-1){ setState('victory'); playMusic('victory'); }
  else setState('clear');
}

/* ============================================================
   UPDATE — PLAY
   ============================================================ */
function movingPlatPos(p, t){
  const off = Math.sin((t*p.speed + p.phase)) * p.range;
  return { x: p.axis==='x' ? p.ox+off : p.ox, y: p.axis==='y' ? p.oy+off : p.oy };
}

function solidAt(p){ // is platform currently solid/collidable
  return !p.dead;
}

function updatePlay(dt){
  const def = L.def;
  L.t += dt;
  if(L.tpCooldown>0) L.tpCooldown -= dt;

  /* --- death animation --- */
  if(deathT >= 0){
    deathT += dt;
    player.y += player.vy*dt; player.vy += GRAV*dt*0.6;
    if(deathT > 1.0){ loadLevel(levelIndex); }
    updateProjectiles(dt);
    updateCamera(dt);
    return;
  }

  if(tap('r') || tap('R')){ loadLevel(levelIndex); return; }

  /* --- pause --- */
  if(tap('p') || tap('P') || tap('Escape')){
    pauseSel = 0; setState('pause'); playSound('select'); return;
  }

  /* --- moving / crumbling platforms --- */
  for(const p of L.platforms){
    if(p.type==='moving'){
      p.px = p.x; p.py = p.y;
      const pos = movingPlatPos(p, L.t);
      p.x = pos.x; p.y = pos.y;
    }
    if(p.type==='crumble' && p.crumbT>=0){
      p.crumbT += dt;
      if(p.crumbT > 0.62){
        p.fallV += GRAV*dt;
        p.y += p.fallV*dt;
        if(p.y > VH+40) p.dead = true;
      }
    }
  }

  /* --- player input & physics --- */
  const pl = player;
  let mv = 0;
  if(keys['ArrowLeft'] || keys['a'] || keys['A']) mv -= 1;
  if(keys['ArrowRight'] || keys['d'] || keys['D']) mv += 1;
  pl.vx = mv*RUN;
  if(mv!==0) pl.face = mv;
  pl.anim += Math.abs(pl.vx)*dt*0.14;

  if(tap(' ') || tap('ArrowUp') || tap('w') || tap('W')) pl.jbuf = JBUFFER;
  else if(pl.jbuf>0) pl.jbuf -= dt;

  if(pl.onGround) pl.coyote = COYOTE; else pl.coyote -= dt;

  if(pl.jbuf>0 && pl.coyote>0){
    pl.vy = JUMP_V; pl.onGround = false; pl.coyote = 0; pl.jbuf = 0;
    pl.standOn = null;
    playSound('jump');
  }
  // short hop
  if(!keys[' '] && !keys['ArrowUp'] && !keys['w'] && !keys['W'] && pl.vy < -120) pl.vy = -120;

  pl.vy += GRAV*dt;
  if(pl.vy > MAX_FALL) pl.vy = MAX_FALL;

  // ride moving platform
  if(pl.standOn && pl.standOn.type==='moving' && solidAt(pl.standOn)){
    pl.x += pl.standOn.x - pl.standOn.px;
    pl.y += pl.standOn.y - pl.standOn.py;
  }

  // gravity-well pull
  if(def.mechanic==='pull'){
    pl.x -= (pl.onGround ? def.pull.ground : def.pull.air) * dt;
  }

  pl.prevBottom = pl.y + pl.h;

  /* horizontal move + resolve vs full solids */
  pl.x += pl.vx*dt;
  for(const p of L.platforms){
    if(!solidAt(p) || p.oneway) continue;
    if(rectsOverlap(pl,p)){
      if(pl.vx>0) pl.x = p.x - pl.w; else if(pl.vx<0) pl.x = p.x + p.w;
      else pl.x = (pl.x < p.x) ? p.x-pl.w : p.x+p.w;
    }
  }
  pl.x = clamp(pl.x, 0, def.width - pl.w);

  /* vertical move + resolve */
  pl.y += pl.vy*dt;
  pl.onGround = false; pl.standOn = null;
  for(const p of L.platforms){
    if(!solidAt(p)) continue;
    if(!rectsOverlap(pl,p)) continue;
    if(p.oneway){
      if(pl.vy>=0 && pl.prevBottom <= p.y+4){
        pl.y = p.y - pl.h; pl.vy = 0; pl.onGround = true; pl.standOn = p;
        if(p.type==='crumble' && p.crumbT<0){ p.crumbT = 0; playSound('crumble'); }
      }
    } else {
      if(pl.vy>0 && pl.prevBottom <= p.y+4){
        pl.y = p.y - pl.h; pl.vy = 0; pl.onGround = true; pl.standOn = p;
      } else if(pl.vy<0 && pl.y >= p.y+p.h-6){
        pl.y = p.y+p.h; pl.vy = 0;
      }
    }
  }

  /* pit death (or the breach, which is a doorway) */
  if(pl.y > VH+30){
    const bc = def.breach;
    if(bc && L.breachBroken && pl.x+pl.w/2 >= bc.x-2 && pl.x+pl.w/2 <= bc.x+bc.w+2){
      playSound('portal'); setState('noclip'); return;
    }
    killPlayer();
  }

  /* autoscroll */
  if(def.mechanic==='autoscroll'){
    if(L.t > 2.0){
      const sc = def.scroll;
      const spd = Math.min(sc.max, sc.base + L.scrollX*sc.ramp);
      L.scrollX = clamp(L.scrollX + spd*dt, 0, def.width - VW);
      if(pl.x + pl.w < L.scrollX + 1) killPlayer();
    }
    if(pl.x > L.scrollX + VW - pl.w - 2) pl.x = L.scrollX + VW - pl.w - 2;
  }

  /* teleporters */
  for(const h of L.hazards){
    if(h.type!=='teleport') continue;
    const r = {x:h.x-8, y:h.y-14, w:16, h:30};
    if(L.tpCooldown<=0 && rectsOverlap(pl, r)){
      pl.x = h.tx; pl.y = h.ty; pl.vy = 0;
      L.tpCooldown = 0.6; shake = 3; playSound('portal');
      addFx('flash', h.x, h.y); addFx('flash', h.tx, h.ty);
      playSound('portal');
    }
  }

  /* hazards */
  updateHazards(dt);

  /* flares */
  if(def.mechanic==='flares'){
    const f = def.flare, cyc = f.safe+f.warn+f.burst;
    const ph = L.t % cyc;
    if(ph > f.safe+f.warn){ // burst
      let covered = false;
      const cx = pl.x + pl.w/2;
      for(const h of L.hazards){
        if(h.type==='cover' && cx>=h.x && cx<=h.x+h.w){ covered=true; break; }
      }
      if(!covered) killPlayer();
    }
  }

  /* enemies */
  updateEnemies(dt);
  updateProjectiles(dt);

  /* fx */
  for(const f of L.fx){ f.t += dt; }
  L.fx = L.fx.filter(f => f.t < f.life);

  /* exit */
  if(L.def.exitLocked){
    L.exitOpen = !L.enemies.some(e => e.type==='miniboss' && e.alive);
  }
  if(def.exit && L.exitOpen && deathT<0){
    const ex = {x:def.exit.x, y:def.exit.y, w:22, h:34};
    if(rectsOverlap(pl, ex)) { levelClear(); return; }
  }

  updateCamera(dt);
  if(shake>0) shake = Math.max(0, shake - dt*20);
}

function updateCamera(dt){
  const def = L.def;
  if(def.mechanic==='autoscroll'){ L.cam = L.scrollX; return; }
  const target = clamp(player.x - VW*0.42, 0, def.width - VW);
  L.cam = def.width <= VW ? 0 : target;
}

function addFx(kind,x,y){ L.fx.push({kind:kind,x:x,y:y,t:0,life:kind==='stomp'?0.35:0.3}); }

/* ---------- hazards ---------- */
function laserOn(h, t){ return ((t + h.phase) % h.period) < h.period*h.duty; }
function laserWarn(h, t){
  const ph = (t + h.phase) % h.period;
  return ph > h.period - 0.3; // about to turn on
}

function updateHazards(dt){
  const pl = { x:player.x+1, y:player.y+1, w:player.w-2, h:player.h-2 }; // forgiving hitbox
  for(const h of L.hazards){
    switch(h.type){
      case 'spike': case 'fire': case 'crystals':
        // kill box is smaller than the flames/spikes look, so edge clips forgive
        if(rectsOverlap(pl, {x:h.x+3, y:h.y+2, w:h.w-6, h:h.h-2})) killPlayer();
        break;
      case 'wire':
        if(rectsOverlap(pl, {x:h.x+1, y:h.y+3, w:h.w-2, h:h.h-3})) killPlayer();
        break;
      case 'mine': {
        const by = h.y + Math.sin(L.t*2 + h.x*0.05)*3;
        if(rectsOverlap(pl, {x:h.x, y:by, w:h.w, h:h.h})) killPlayer();
        break;
      }
      case 'laser':
        if(laserOn(h, L.t) && rectsOverlap(pl, h)) killPlayer();
        break;
    }
  }
}

/* ---------- enemies ---------- */
function onScreen(e){ return e.x+e.w > L.cam-60 && e.x < L.cam+VW+60; }

function updateEnemies(dt){
  const pl = player;
  for(const e of L.enemies){
    if(!e.alive) continue;
    if(e.dieT >= 0){ e.dieT += dt; if(e.dieT>0.35) e.alive=false; continue; }
    if(e.type!=='boss' && e.type!=='miniboss' && !onScreen(e)) continue;
    e.t += dt;

    switch(e.type){
      case 'drone':
        e.x += e.dir*e.speed*dt;
        if(e.x < e.x0){ e.x=e.x0; e.dir=1; }
        if(e.x+e.w > e.x1){ e.x=e.x1-e.w; e.dir=-1; }
        e.yoff = Math.sin(e.t*3)*2;
        break;

      case 'crawler': {
        e.x += e.dir*e.speed*dt;
        // gravity + platform stick
        e.vy = (e.vy||0) + GRAV*dt;
        e.y += e.vy*dt;
        let grounded = false, groundPlat = null;
        for(const p of L.platforms){
          if(!solidAt(p)) continue;
          if(e.x+e.w > p.x && e.x < p.x+p.w && e.y+e.h >= p.y && e.y+e.h <= p.y+10 && e.vy>=0){
            e.y = p.y - e.h; e.vy = 0; grounded = true; groundPlat = p;
          }
        }
        if(grounded && groundPlat){
          // turn at ledges
          const aheadX = e.dir>0 ? e.x+e.w+2 : e.x-2;
          let hasFloor = false;
          for(const p of L.platforms){
            if(!solidAt(p)) continue;
            if(aheadX > p.x && aheadX < p.x+p.w && Math.abs((e.y+e.h)-p.y) < 4){ hasFloor=true; break; }
          }
          if(!hasFloor) e.dir *= -1;
        }
        if(e.y > VH+40) e.alive = false;
        break;
      }

      case 'pirate': {
        e.fireT -= dt;
        if(e.fireT <= 0){
          e.fireT = e.period;
          const py = e.py !== undefined ? e.py : e.y+6;
          L.projectiles.push({x: e.x + (e.dir>0? e.w : -6), y: py, vx: e.dir*112, w:7, h:3, kind:'laser'});
          playSound('shoot');
        }
        break;
      }

      case 'leaper': {
        e.vy = (e.vy||0) + GRAV*dt;
        e.y += e.vy*dt; e.x += e.vx*dt;
        e.onGround = false;
        for(const p of L.platforms){
          if(!solidAt(p)) continue;
          if(e.x+e.w > p.x && e.x < p.x+p.w && e.y+e.h >= p.y && e.y+e.h <= p.y+12 && e.vy>=0){
            e.y = p.y - e.h; e.vy = 0; e.vx = 0; e.onGround = true;
          }
        }
        if(e.onGround){
          e.jumpT -= dt;
          if(e.jumpT <= 0){
            e.jumpT = 2.1;
            const dir = pl.x > e.x ? 1 : -1;
            e.vx = dir*54; e.vy = -205;
          }
        }
        if(e.y > VH+40) e.alive = false;
        break;
      }

      case 'turret': {
        e.fireT -= dt;
        if(e.fireT <= 0){
          e.fireT = e.period;
          L.projectiles.push({x: e.x + (e.dir>0? e.w : -6), y: e.y+4, vx: e.dir*105, w:7, h:3, kind:'laser'});
          playSound('shoot');
        }
        break;
      }

      case 'miniboss': {
        if(!e.active){ if(pl.x > e.trigger) e.active = true; else break; }
        if(e.invuln>0) e.invuln -= dt;
        e.vy += GRAV*dt; e.y += e.vy*dt; e.x += e.vx*dt;
        e.onGround = false;
        for(const p of L.platforms){
          if(!solidAt(p) || p.oneway) continue;
          if(e.x+e.w > p.x && e.x < p.x+p.w && e.y+e.h >= p.y && e.y+e.h <= p.y+14 && e.vy>=0){
            e.y = p.y - e.h; e.vy = 0; e.vx *= 0.6; e.onGround = true;
          }
        }
        e.x = clamp(e.x, 1990, L.def.width-40);
        if(e.onGround){
          e.hopT -= dt;
          if(e.hopT <= 0){
            e.hopT = 1.6;
            const dir = pl.x > e.x ? 1 : -1;
            e.face = dir; e.vx = dir*48; e.vy = -200;
          }
        }
        e.fireT -= dt;
        if(e.fireT <= 0){
          e.fireT = 2.5;
          const dir = pl.x > e.x ? 1 : -1;
          L.projectiles.push({x: e.x + e.w/2, y: e.y+10, vx: dir*100, w:7, h:3, kind:'laser'});
          playSound('shoot');
        }
        break;
      }

      case 'boss': updateBoss(e, dt); break;
    }

    /* --- contact with player --- */
    if(deathT>=0) continue;
    const ey = e.type==='drone' ? e.y + (e.yoff||0) : e.y;
    const er = {x:e.x+1, y:ey+1, w:e.w-2, h:e.h-2};
    if(!rectsOverlap(pl, er)) continue;

    const stompable = true;
    const invulnNow = (e.invuln||0) > 0;
    const falling = pl.vy > 30 && pl.prevBottom <= ey + 9;

    if(stompable && falling && !invulnNow){
      // stomp!
      pl.vy = -185; pl.y = ey - pl.h - 1;
      playSound('stomp'); addFx('stomp', e.x+e.w/2, ey);
      if(e.type==='miniboss' || e.type==='boss'){
        e.hp--; e.invuln = 1.2; shake = 4; playSound('hit');
        if(e.type==='boss'){ e.phase = 4-e.hp; e.vx = 0; }
        if(e.hp<=0){
          if(e.type==='boss'){ e.dying = 0.001; e.invuln = 99; }
          else { e.dieT = 0; onGuardianDown(); }
        }
      } else {
        e.dieT = 0;
      }
    } else if(!invulnNow){
      killPlayer();
    }
  }
  L.enemies = L.enemies.filter(e => e.alive);
}

/* ---------- boss ---------- */
function updateBoss(b, dt){
  const pl = player;
  if(b.dying > 0){
    b.dying += dt;
    if(b.dying > 2.0){
      b.alive = false;
      saveProgress(levelIndex+1);
      playSound('clear');
      setState('victory'); playMusic('victory');
    }
    return;
  }
  if(b.invuln>0) b.invuln -= dt;

  const spd  = [0, 50, 68, 88][b.phase] || 88;
  const hopI = [0, 1.7, 1.3, 1.0][b.phase] || 1.0;
  const fireI= [0, 2.7, 2.1, 1.6][b.phase] || 1.6;
  const pspd = [0, 95, 112, 130][b.phase] || 130;

  b.vy += GRAV*dt; b.y += b.vy*dt; b.x += b.vx*dt;
  b.onGround = false;
  for(const p of L.platforms){
    if(p.oneway) continue;
    if(b.x+b.w > p.x && b.x < p.x+p.w && b.y+b.h >= p.y && b.y+b.h <= p.y+14 && b.vy>=0){
      b.y = p.y - b.h; b.vy = 0; b.vx *= 0.5; b.onGround = true;
    }
  }
  b.x = clamp(b.x, 4, VW-b.w-4);

  if(b.onGround){
    b.hopT -= dt;
    if(b.hopT <= 0){
      b.hopT = hopI;
      const dir = pl.x > b.x ? 1 : -1;
      b.face = dir; b.vx = dir*spd; b.vy = -225;
    }
  }
  b.fireT -= dt;
  if(b.fireT <= 0){
    b.fireT = fireI;
    const dir = pl.x > b.x ? 1 : -1;
    L.projectiles.push({x: b.x+b.w/2, y: b.y+12, vx: dir*pspd, w:8, h:3, kind:'orb'});
    if(b.phase>=2)
      L.projectiles.push({x: b.x+b.w/2, y: b.y+4, vx: dir*pspd*0.8, w:8, h:3, kind:'orb'});
    playSound('shoot');
  }
  if(b.phase>=3){
    b.debrisT -= dt;
    if(b.debrisT <= 0){
      b.debrisT = 1.9;
      const dx = clamp(pl.x + (Math.random()*80-40), 20, VW-20);
      L.projectiles.push({x: dx, y: -10, vx: 0, vy: 120, w:6, h:8, kind:'debris'});
    }
  }
}

/* ---------- projectiles ---------- */
function updateProjectiles(dt){
  const pl = player;
  for(const pr of L.projectiles){
    pr.x += pr.vx*dt;
    if(pr.vy) pr.y += pr.vy*dt;
    pr.dead = pr.x < L.cam-80 || pr.x > L.cam+VW+80 || pr.y > VH+20;
    if(!pr.dead && !pr.vy){
      for(const p of L.platforms){
        if(!solidAt(p) || p.oneway) continue;
        if(rectsOverlap(pr,p)){ pr.dead=true; break; }
      }
    }
    if(!pr.dead && deathT<0 && rectsOverlap({x:pl.x+1,y:pl.y+1,w:pl.w-2,h:pl.h-2}, pr)){ pr.dead=true; killPlayer(); }
  }
  L.projectiles = L.projectiles.filter(p=>!p.dead);
}

/* pre-generated starfields (two parallax layers) */
const STARS1 = [], STARS2 = [];
(function(){
  const rng = makeRng(777);
  for(let i=0;i<70;i++) STARS1.push({x:rng()*960, y:rng()*220, c:rng()<0.2?'#ff8a6a':(rng()<0.5?'#8fd0ff':'#dfe6f2'), s:1});
  for(let i=0;i<30;i++) STARS2.push({x:rng()*960, y:rng()*200, c:'#ffffff', s:rng()<0.3?2:1, tw:rng()*6});
})();

function drawSky(theme, camx){
  const th = THEME[theme] || THEME.moon;
  ctx.fillStyle = th.sky0; ctx.fillRect(0,0,VW,VH);
  ctx.fillStyle = th.sky1; ctx.fillRect(0,VH*0.45,VW,VH*0.55);
  if(!th.stars) return;
  for(const s of STARS1){
    const x = ((s.x - camx*0.25) % 960 + 960) % 960 - 240;
    if(x<-2||x>VW) continue;
    ctx.fillStyle = s.c; ctx.fillRect(Math.floor(x), Math.floor(s.y), 1, 1);
  }
  for(const s of STARS2){
    const x = ((s.x - camx*0.5) % 960 + 960) % 960 - 240;
    if(x<-2||x>VW) continue;
    const tw = Math.sin(gtime*3 + s.tw) > -0.3;
    if(!tw) continue;
    ctx.fillStyle = s.c; ctx.fillRect(Math.floor(x), Math.floor(s.y), s.s, s.s);
    if(s.s===2){ ctx.fillRect(Math.floor(x)-1, Math.floor(s.y), 1,1); ctx.fillRect(Math.floor(x)+2, Math.floor(s.y),1,1); }
  }
}

function drawPlanet(x,y,r,c1,c2){
  // crisp pixel-art circle: drawn scanline by scanline on integer coords
  // (no ctx.arc — arcs get anti-aliased and look blurry next to pixel art)
  x = Math.round(x); y = Math.round(y); r = Math.max(2, Math.round(r));
  const ox = Math.round(r*0.35), oy = Math.round(r*0.3), rs = Math.round(r*0.85); // shade circle
  const bands = [ // [rowTop, rowBottom, xFrom, xTo] relative to center
    [Math.round(-r*0.3),  Math.round(-r*0.3)+2,  Math.round(-r*0.7), Math.round(-r*0.7 + r*1.2)],
    [Math.round( r*0.2),  Math.round( r*0.2)+2,  Math.round(-r*0.5), Math.round(-r*0.5 + r*1.0)],
    [Math.round(-r*0.05), Math.round(-r*0.05)+1, Math.round(-r*0.9), Math.round(-r*0.9 + r*0.6)]
  ];
  for(let dy=-r; dy<=r; dy++){
    const hw = Math.floor(Math.sqrt(r*r - dy*dy));
    ctx.fillStyle = c1;
    ctx.fillRect(x-hw, y+dy, hw*2+1, 1);
    for(const b of bands){
      if(dy>=b[0] && dy<=b[1]){
        const x0 = Math.max(-hw, b[2]), x1 = Math.min(hw, b[3]);
        if(x1>x0){ ctx.fillStyle = c2; ctx.fillRect(x+x0, y+dy, x1-x0, 1); }
      }
    }
    const sy = dy - oy;
    if(Math.abs(sy) <= rs){
      const shw = Math.floor(Math.sqrt(rs*rs - sy*sy));
      const s0 = Math.max(-hw, ox-shw), s1 = Math.min(hw, ox+shw);
      if(s1>=s0){ ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(x+s0, y+dy, s1-s0+1, 1); }
    }
  }
}

function hsh(i){ const x = Math.sin(i*127.1+311.7)*43758.5453; return x - Math.floor(x); }

/* a small pixel heart, centered on (cx,cy); s = pixel scale */
function drawHeart(cx, cy, s, col){
  s = s||1;
  const map = ['.XX.XX.','XXXXXXX','XXXXXXX','.XXXXX.','..XXX..','...X...'];
  ctx.fillStyle = col||'#ff5a7a';
  const w = map[0].length;
  for(let r=0;r<map.length;r++) for(let c=0;c<w;c++){
    if(map[r][c]==='X') ctx.fillRect(Math.round(cx-(w*s)/2)+c*s, Math.round(cy)+r*s, s, s);
  }
  // little shine
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillRect(Math.round(cx-(w*s)/2)+1*s, Math.round(cy)+1*s, s, s);
}

function mkPeak(cx, hw, ph, baseY){
  for(let i=0;i<ph;i++){
    const w2 = Math.round(hw*(i/ph));
    ctx.fillRect(cx-w2, baseY-ph+i, w2*2+2, 1);
  }
}
function mkCloud(cx, cy, s, c0, c1, c2){
  ctx.fillStyle = c2; ctx.fillRect(cx, cy+Math.round(6*s), Math.round(46*s), Math.round(6*s));
  ctx.fillStyle = c1;
  ctx.fillRect(cx+Math.round(4*s), cy+Math.round(2*s), Math.round(38*s), Math.round(6*s));
  ctx.fillRect(cx+Math.round(12*s), cy-Math.round(2*s), Math.round(18*s), Math.round(5*s));
  ctx.fillStyle = c0;
  ctx.fillRect(cx+Math.round(8*s), cy, Math.round(24*s), Math.round(3*s));
  ctx.fillRect(cx+Math.round(14*s), cy-Math.round(4*s), Math.round(10*s), Math.round(3*s));
}
/* a single faceted crystal spike: bx,baseY = base center; h = height; hw = half-width.
   'up' true points up (from floor), false points down (from ceiling). */
function mkCrystal(bx, baseY, h, hw, main, light, dark, up){
  bx = Math.round(bx); baseY = Math.round(baseY);
  const dir = up ? -1 : 1;
  for(let l=0;l<h;l++){
    const f = up ? (1 - l/h) : (1 - l/h);      // taper to the tip
    const w2 = Math.max(0, Math.round(hw*f));
    const yy = baseY + dir*l;
    ctx.fillStyle = main; ctx.fillRect(bx-w2, yy, w2*2+1, 1);
    // left facet highlight
    ctx.fillStyle = light; ctx.fillRect(bx-w2, yy, Math.max(1,Math.round(w2*0.5)), 1);
    // right facet shadow
    ctx.fillStyle = dark;  ctx.fillRect(bx+Math.round(w2*0.4), yy, Math.max(1,w2-Math.round(w2*0.4))+1, 1);
  }
  // bright core seam + glint near tip
  ctx.fillStyle = light;
  ctx.fillRect(bx, baseY, 1, dir*Math.min(h, Math.round(h*0.7)) || 1);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(bx, baseY + dir*Math.round(h*0.72), 1, 2);
}
/* a cluster of a few crystals sharing a base.
   seed (optional): stable value for the height hash — without it, parallax-moving
   callers would re-hash a shifting x and the crystals would shimmer as the camera pans. */
function mkCrystalCluster(bx, baseY, scale, palIdx, up, seed){
  const cols = [
    ['#57c8ff','#c6f4ff','#2a78b8'], // cyan
    ['#c06cff','#eeccff','#7a3fb0'], // magenta
    ['#5ce0a0','#c6ffe0','#2a9060'], // green
    ['#ffd44e','#fff2b0','#b08a1e'], // gold
    ['#8fb2f0','#d8e6ff','#4a6fb0'], // blue
    ['#f47fb4','#ffd6ea','#b04a7e'], // pink
    ['#ff9a3c','#ffddb0','#b8641e']  // orange
  ];
  const c = cols[palIdx % cols.length];
  const H = Math.round((16+ (hsh(seed!==undefined? seed : bx)*10))*scale);
  mkCrystal(bx,      baseY, H,            Math.round(4*scale), c[0], c[1], c[2], up);
  mkCrystal(bx-Math.round(6*scale), baseY, Math.round(H*0.62), Math.round(3*scale), c[0], c[1], c[2], up);
  mkCrystal(bx+Math.round(6*scale), baseY, Math.round(H*0.72), Math.round(3*scale), c[0], c[1], c[2], up);
}

/* an actively erupting volcano, self-animating (independent of the flare mechanic).
   cx = summit center x, baseY = ground line, ph = 0..1 eruption intensity. */
function drawVolcano(cx, baseY, scale, ph){
  cx = Math.round(cx);
  const H = Math.round(120*scale), craterY = baseY - H;
  ctx.fillStyle = '#2a1410';
  mkPeak(cx, Math.round(95*scale), H, baseY);
  ctx.fillStyle = '#1c0d0a';
  for(let l=0;l<H;l++){ const w2 = Math.round(95*scale*(l/H)); ctx.fillRect(cx-w2, baseY-H+l, Math.round(w2*0.5), 1); }
  ctx.fillStyle = '#ff6a2e';
  for(let s=0;s<3;s++){
    let lx = cx + (s-1)*10;
    for(let l=0;l<H-6;l+=2){
      lx += Math.round(Math.sin(l*0.3+s*2)*1.2) + (s-1);
      if(l>H*0.25) ctx.fillRect(lx, baseY-H+6+l, 2, 2);
    }
  }
  ctx.fillStyle = '#ffd44e';
  for(let s=0;s<2;s++){ let lx=cx+(s*2-1)*6; for(let l=Math.round(H*0.4);l<H-6;l+=3){ lx+=(s*2-1); ctx.fillRect(lx, baseY-H+6+l, 1, 2);} }
  const hot = 0.5 + ph*0.5;
  ctx.fillStyle = 'rgba(255,120,40,'+(0.5+hot*0.5).toFixed(2)+')';
  ctx.fillRect(cx-Math.round(11*scale), craterY, Math.round(22*scale), 4);
  ctx.fillStyle = '#ff9a3c'; ctx.fillRect(cx-Math.round(6*scale), craterY+1, Math.round(13*scale), 2);
  ctx.fillStyle = '#ffe9a8'; ctx.fillRect(cx-2, craterY+1, 4, 2);
  const plume = 0.6 + ph*0.4;
  for(let i=0;i<18;i++){
    const rise = (gtime*22 + i*13) % 130;
    const py = craterY - rise;
    const spread = 3 + rise*0.18;
    const pxo = Math.sin(gtime*0.8 + i)*spread + (hsh(i)-0.5)*spread;
    const s = 3 + Math.floor(hsh(i+9)*4);
    const a = (1 - rise/130)*0.6*plume;
    ctx.fillStyle = 'rgba(60,48,52,'+a.toFixed(2)+')';
    ctx.fillRect(Math.round(cx+pxo), Math.round(py), s, s);
  }
  for(let i=0;i<8;i++){
    const t2 = (gtime*1.4 + i*0.37) % 1;
    const vx = (hsh(i)-0.5)*40, vy = -46 - hsh(i+3)*20;
    const ex = cx + vx*t2;
    const ey = craterY + vy*t2 + 60*t2*t2;
    ctx.fillStyle = i%2? '#ffd44e':'#ff7a2e';
    ctx.fillRect(Math.round(ex), Math.round(ey), 2, 2);
  }
}


function mkPines(px, baseY, col, span){
  ctx.fillStyle = col;
  for(let p2=0;p2<Math.ceil(span/21);p2++){
    const tx = Math.round(((8 + p2*21 + Math.floor(hsh(p2)*8) + px) % span + span) % span - 40);
    if(tx<-12||tx>VW+12) continue;
    const th2 = 10 + Math.floor(hsh(p2+44)*6);
    for(let l=0;l<th2;l++){
      const w3 = Math.round((l/th2)*3.5);
      ctx.fillRect(tx-w3, baseY-th2+l, w3*2+1, 1);
    }
  }
}

}

      (function(){
        const pcx = 330+px*0.5, pcy = 50, tilt = 0.34;
        for(let ring=0; ring<3; ring++){

            // draw only the arc that reads as "in front / behind" — skip nothing, thin dots
            if(Math.sin(ang) < 0 && Math.abs(rx-pcx) < 20 && ry < pcy) continue; // hidden behind planet top
            ctx.fillRect(Math.round(rx), Math.round(ry), ring===1?2:1, 1);
